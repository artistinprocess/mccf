// ─────────────────────────────────────────────
// _validateAndBuildOrderGroups — V4 waypointOrder validator
// ─────────────────────────────────────────────
// Reads <Path waypointOrder="N"> from _scene.xml DOM.
// Returns {1:[safeName,...], 2:[...], ...} on success.
// Returns null and shows error on any missing/invalid waypointOrder.
// Also warns (does not halt) if order numbers have gaps.
// Called in pbPlayAll before any agent is fired.
function _validateAndBuildOrderGroups(sceneDoc, cultivarList) {
  var el = document.getElementById('pb-step-info');
  var pathEls = sceneDoc ? sceneDoc.querySelectorAll('Path') : [];

  if (!pathEls.length) {
    if (el) el.textContent = 'HALT: no <Path> elements found in scene XML — cannot sequence.';
    console.error('_validateAndBuildOrderGroups: no Path elements in scene XML');
    return null;
  }

  var groups = {};         // {orderInt: [safeName, ...]}
  var errors = [];

  pathEls.forEach(function(pEl) {
    var agent = pEl.getAttribute('agent') || '';
    var name  = pEl.getAttribute('name')  || '';
    var orderRaw = pEl.getAttribute('waypointOrder');

    // Missing entirely or empty string → authoring error
    if (orderRaw === null || orderRaw === undefined || String(orderRaw).trim() === '' || orderRaw === 'MISSING') {
      errors.push('Path "' + name + '" (agent: ' + agent + '): waypointOrder MISSING');
      return;
    }

    var orderInt = parseInt(orderRaw, 10);
    if (isNaN(orderInt) || orderInt < 1) {
      errors.push('Path "' + name + '" (agent: ' + agent + '): waypointOrder "' + orderRaw + '" is not a positive integer');
      return;
    }

    var safeName = agent.replace(/[^A-Za-z0-9_]/g, '_');
    if (!groups[orderInt]) groups[orderInt] = [];
    if (groups[orderInt].indexOf(safeName) === -1) groups[orderInt].push(safeName);
  });

  if (errors.length) {
    var msg = 'HALT — waypointOrder errors:\n' + errors.join('\n');
    if (el) el.innerHTML = '<span style="color:#f06060">' + msg.replace(/\n/g,'<br>') + '</span>';
    console.error('_validateAndBuildOrderGroups:', msg);
    return null;
  }

  // Warn on gaps (1 and 3 with no 2) — not a halt, author may have reserved space
  var orderNums = Object.keys(groups).map(Number).sort(function(a,b){return a-b;});
  for (var gi = 1; gi < orderNums.length; gi++) {
    if (orderNums[gi] - orderNums[gi-1] > 1) {
      console.warn('_validateAndBuildOrderGroups: gap in order numbers between',
        orderNums[gi-1], 'and', orderNums[gi], '— may be intentional');
    }
  }

  console.log('_validateAndBuildOrderGroups: groups =', JSON.stringify(groups));
  return groups;
}

// ─────────────────────────────────────────────
// _pbWaitForGroup — resolves when all agents in group have _pbArcComplete=true
// ─────────────────────────────────────────────
// Polls every 200ms. Timeout after 10 minutes (safety valve).
function _pbWaitForGroup(groupSafeNames) {
  return new Promise(function(resolve) {
    var POLL_MS = 200;
    var MAX_POLLS = 3000; // 10 minutes
    var polls = 0;
    function check() {
      polls++;
      var allDone = groupSafeNames.every(function(sn) { return !!_pbArcComplete[sn]; });
      if (allDone) {
        console.log('_pbWaitForGroup: all complete —', groupSafeNames);
        resolve();
        return;
      }
      if (polls >= MAX_POLLS) {
        console.warn('_pbWaitForGroup: timeout waiting for', groupSafeNames,
          '— completed:', Object.keys(_pbArcComplete).filter(function(k){return _pbArcComplete[k];}));
        resolve(); // resolve anyway so scene doesn't hang forever
        return;
      }
      setTimeout(check, POLL_MS);
    }
    check();
  });
}

// ─────────────────────────────────────────────
// pbPlayAll — ordered group sequencer (V4)
// ─────────────────────────────────────────────
// Calls POST /arc/playback/start/all to start every arc as independent
// server sessions. Groups are fired in ascending waypointOrder. Each group
// fires simultaneously; the next group waits for ALL _pbArcComplete in the
// current group before starting.
//
// HARD STOP: if any Path in _scene.xml is missing waypointOrder, the scene
// does not run. The validator logs the specific path name and halts.

async function pbPlayAll() {
  console.log('pbPlayAll: called — _pbCbGeneration=', _pbCbGeneration, '_x3dTimerActive keys:', Object.keys(_x3dTimerActive));

  // Guard: prevent concurrent calls (e.g. Reset fires pbPlayAll while Play All button also fired)
  if (window._pbPlayAllInFlight) {
    console.warn('pbPlayAll: already in flight — ignoring duplicate call');
    return;
  }
  window._pbPlayAllInFlight = true;
  try {
    await _pbPlayAllInner();
  } finally {
    window._pbPlayAllInFlight = false;
  }
}

async function _pbPlayAllInner() {
  console.log('_pbPlayAllInner: entered');
  // Edge drops the gesture lock after any await. Speech warm-up must be the
  // last synchronous operation before the function yields again.
  // So: fetch arc sessions first, then warm up speech, then proceed.

  // Reset all playback state
  if (window._pbPollingSegment) {
    Object.keys(window._pbPollingSegment).forEach(function(k){ window._pbPollingSegment[k] = false; });
  }
  window._pbPollingSegment = {};
  _pbStepInFlight = {};
  _pbArcComplete = {};
  _pbExpectedAgents = 0;
  _pbLastArcFiles = [];
  _chorusTranscript = [];     // clear transcript for new run
  _chorusFinalCV   = {};
  _pbCultivarSessionMap = {};
  _pbPendingOnComplete = {};
  _pbSpeakToken = {};
  _pbSpeakTimer = {};
  _pbSpeechLock  = false;
  _pbSpeechQueue = [];
  _pbLastSpoken = {};
  _pbLastStepKey = {};
  _x3dLastArrivedSeg = {};
  _zoneCommandQueue = [];
  _zoneCommandInFlight = false;
  _chorusLastTimestamp = 0;
  stopChorusPoll();
  dismissChorus();
  fetch(API + '/chorus/clear', {method: 'POST'}).catch(function(){});

  var pace = parseFloat(document.getElementById('pb-pace').value) || 3.0;
  var loop = document.getElementById('pb-loop').checked;

  try {
    console.log('pbPlayAll: try block entered — calling start/all');
    // Pause all polling so Flask (single-threaded) can service start/all without queuing behind polls
    pollingActive = false;
    console.log('pbPlayAll: polling paused — calling start/all');
    var r = await fetch(API + '/arc/playback/start/all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pace: pace, loop: loop, auto: false}),
      signal: AbortSignal.timeout(30000)
    });
    console.log('pbPlayAll: start/all status =', r.status);
    var data = await r.json();
    console.log('pbPlayAll: start/all data =', JSON.stringify(data).slice(0,300));
    if (data.error) {
      document.getElementById('pb-step-info').textContent = 'Play All error: ' + data.error;
      console.error('pbPlayAll: server error —', data.error);
      return;
    }

    var sessions = data.sessions || {};
    var sessionIds = Object.keys(sessions);
    pollingActive = true;  // resume polling now that start/all has returned
    console.log('pbPlayAll: polling resumed — sessionIds =', sessionIds);
    if (sessionIds.length === 0) {
      document.getElementById('pb-step-info').textContent = 'No arc files found — check arc exports exist.';
      console.warn('pbPlayAll: no sessions — arc files missing or server error');
      return;
    }

    // Collect all cultivars across all sessions for X3D timer activation
    var allCultivars = [];
    var cultivarSessionMap = {};
    sessionIds.forEach(function(sid) {
      var s = sessions[sid];
      var stateData = s.state || s;
      var cultivars = stateData.cultivars || [];
      cultivars.forEach(function(c) {
        if (allCultivars.indexOf(c) === -1) allCultivars.push(c);
        cultivarSessionMap[c] = sid;
        // Seed cultivar actor from arc data if not yet in _cultivarActors
        if (!_cultivarActors[c]) {
          var actor = stateData.actor || (stateData.current_waypoint||{}).actor || 'ollama';
          _cultivarActors[c] = actor;
        }
        // Waypoint positions cached progressively by pbUpdateDisplay as steps arrive.
      });
    });

    pbStopPolling();
    var el = document.getElementById('pb-step-info');
    if (el) el.textContent = 'Playing ' + sessionIds.length + ' arcs — ' + allCultivars.join(', ');

    // Track expected completions and arc files for Chorus
    _pbExpectedAgents = allCultivars.length;
    // Try .file field first (single-arc sessions supply it); start/all sessions do not.
    _pbLastArcFiles = sessionIds.map(function(sid) {
      return (sessions[sid].state || sessions[sid]).file || '';
    }).filter(Boolean);
    // Fallback: match arc filenames in pb-file dropdown by cultivar name
    // Arc filenames are like arc_{sceneName}_{CultivarName}_{timestamp}.xml
    // Session IDs (path_Cindy) do NOT match arc filenames — use cultivar names instead.
    if (_pbLastArcFiles.length === 0) {
      var pbSel = document.getElementById('pb-file');
      var dropdownVals = pbSel ? Array.from(pbSel.options).map(function(o){return o.value;}).filter(Boolean) : [];
      allCultivars.forEach(function(cultivar) {
        // Match any dropdown entry that contains the cultivar name (case-insensitive, underscores normalised)
        var safeCultivar = cultivar.replace(/[^A-Za-z0-9]/g, '_');
        var match = dropdownVals.find(function(v) {
          var vSafe = v.replace(/[^A-Za-z0-9]/g, '_');
          return vSafe.toLowerCase().indexOf(safeCultivar.toLowerCase()) !== -1;
        });
        if (match && _pbLastArcFiles.indexOf(match) === -1) _pbLastArcFiles.push(match);
      });
      // If still nothing, use all dropdown values as last resort
      if (_pbLastArcFiles.length === 0) {
        _pbLastArcFiles = dropdownVals.slice();
      }
    }
    // Store cultivar→session map so _pbAdvanceSeg can step the correct session
    _pbCultivarSessionMap = {};
    Object.keys(cultivarSessionMap).forEach(function(c) {
      var safeName = c.replace(/[^A-Za-z0-9_]/g, '_');
      _pbCultivarSessionMap[safeName] = cultivarSessionMap[c];
    });
    console.log('pbPlayAll: expecting', _pbExpectedAgents, 'agents, arc files:', _pbLastArcFiles,
                'sessionMap:', _pbCultivarSessionMap);

    // ── Speech unlock — MUST be here, after all awaits, before any speak() calls ──
    // Edge drops gesture lock after await. Warm-up here re-locks it for the
    // pbUpdateDisplay → pbSpeakQALines calls that follow synchronously.
    if (window.speechSynthesis) {
      try {
        if (speechSynthesis.paused) speechSynthesis.resume();
        var _warmUp2 = new SpeechSynthesisUtterance(' ');
        _warmUp2.volume = 0; _warmUp2.rate = 10;
        _warmUp2.onend = function() { console.log('pbPlayAll: speech warm-up (post-await) complete'); };
        speechSynthesis.speak(_warmUp2);
      } catch(e) {}
    }

    // ── V4: validate waypointOrder and build order groups ──────────────────
    // Parse _scene.xml to get waypointOrder per path.
    // _parseSceneZoneData already loaded it — re-fetch the same doc.
    var xSel2 = document.getElementById('x3d-file');
    var xFname2 = xSel2 ? xSel2.value : '';
    var sceneName2 = xFname2.replace(/\.x3d$/i, '');
    var orderGroups = null;

    var validatorRan = false;
    if (sceneName2) {
      try {
        var sceneXmlResp = await fetch(API + '/scene/load/scene/raw?filename=' +
          encodeURIComponent(sceneName2 + '_scene.xml'));
        if (sceneXmlResp.ok) {
          var sceneXmlText = await sceneXmlResp.text();
          var sceneDoc = new DOMParser().parseFromString(sceneXmlText, 'text/xml');
          orderGroups = _validateAndBuildOrderGroups(sceneDoc, allCultivars);
          validatorRan = true;
        } else {
          console.warn('pbPlayAll: scene XML fetch failed (' + sceneXmlResp.status + ') — skipping waypointOrder validation, firing simultaneously');
        }
      } catch(xmlErr) {
        console.warn('pbPlayAll: scene XML fetch error —', xmlErr, '— skipping validation, firing simultaneously');
      }
    }

    // Only halt if the validator actually ran and found errors (null = authoring error).
    // If fetch failed, validatorRan=false and we fall through to simultaneous fallback.
    if (validatorRan && orderGroups === null) {
      // pb-step-info already shows the specific error from _validateAndBuildOrderGroups
      return;
    }

    // Activate X3D timers (registers Arrival_ callbacks and arms avatars)
    _pbCbGeneration++;
    console.log('pbPlayAll: _pbCbGeneration now', _pbCbGeneration);
    pbActivateX3DTimers(allCultivars, cultivarSessionMap);
    console.log('pbPlayAll: after pbActivateX3DTimers — _x3dTimerActive keys:', Object.keys(_x3dTimerActive));

    if (orderGroups) {
      // ── Ordered group sequencer ────────────────────────────────────────
      // Fire groups in ascending order. Each group starts all its agents
      // simultaneously, then waits for ALL _pbArcComplete before next group.
      var sortedOrders = Object.keys(orderGroups).map(Number).sort(function(a,b){return a-b;});
      console.log('pbPlayAll: order sequence =', sortedOrders);

      for (var gi = 0; gi < sortedOrders.length; gi++) {
        var currentOrder = sortedOrders[gi];
        var groupNames = orderGroups[currentOrder];
        console.log('pbPlayAll: firing group order=' + currentOrder + ' agents=' + groupNames.join(','));

        // Find session IDs for this group's cultivars
        var groupSids = [];
        groupNames.forEach(function(safeName) {
          var sid = _pbCultivarSessionMap[safeName];
          if (sid && groupSids.indexOf(sid) === -1) groupSids.push(sid);
        });

        // Display WP1, seed phi, fire zone commands for this group
        groupSids.forEach(function(sid) {
          var stateData = sessions[sid] ? (sessions[sid].state || sessions[sid]) : null;
          if (!stateData || stateData.status === 'idle') return;
          pbUpdateDisplay(stateData);
          _seedArcRecord(stateData);
          var _wp1 = stateData.current_waypoint || {};
          var _wp1c = _wp1.cultivar || ((stateData.cultivars||[])[0]) || '';
          var _wp1z = _wp1.zone || _wp1.zone_id || '';
          if (!_wp1z && _wp1c) {
            var cands = [_wp1.id, _wp1.key, _wp1.name, _wp1.label,
                         (_wp1.id||'').toLowerCase(),
                         'wp'+(_wp1.id||'').toLowerCase(),
                         'wp'+(_wp1.label||'').toLowerCase()];
            for (var _wi = 0; _wi < cands.length; _wi++) {
              if (cands[_wi] && _waypointZoneMap[cands[_wi]]) { _wp1z = _waypointZoneMap[cands[_wi]]; break; }
            }
          }
          if (_wp1c && _wp1z) { _agentZone[_wp1c] = _wp1z; _fireZoneCommand(_wp1c, _wp1z, 'OnEnter', _wp1.stepno||1); }
        });
        _fireCouplerTick();
        // pbUpdateDisplay above triggers: TTS → pbReleaseDwell → startFromLoader → Timer_1.
        // Do NOT fire startFromLoader independently here — that would race with TTS.
        console.log('pbPlayAll: group', currentOrder, 'WP1 chain started for agents', groupNames.join(','));

        // Wait for all agents in this group to complete before next group
        if (gi < sortedOrders.length - 1) {
          console.log('pbPlayAll: waiting for group', currentOrder, 'to complete before firing group', sortedOrders[gi+1]);
          await _pbWaitForGroup(groupNames);
          console.log('pbPlayAll: group', currentOrder, 'complete — advancing to group', sortedOrders[gi+1]);
        }
      }

    } else {
      // No scene XML / validation skipped — fall back to simultaneous firing
      console.log('pbPlayAll: no orderGroups (scene XML unavailable) — firing all simultaneously');
      sessionIds.forEach(function(sid) {
        var stateData = sessions[sid].state || sessions[sid];
        if (!stateData || stateData.status === 'idle') return;
        pbUpdateDisplay(stateData);
        _seedArcRecord(stateData);
        var _wp1 = stateData.current_waypoint || {};
        var _wp1c = _wp1.cultivar || ((stateData.cultivars||[])[0]) || '';
        // Seed waypoint cache with WP1 position immediately
        if (_wp1c && _wp1.pos_x !== undefined && _wp1.stepno !== undefined) {
          var _wp1safe = _wp1c.replace(/[^A-Za-z0-9_]/g, '_');
          if (!_agentWaypointCache[_wp1safe]) _agentWaypointCache[_wp1safe] = {};
          _agentWaypointCache[_wp1safe][_wp1.stepno] = { pos_x: _wp1.pos_x, pos_z: _wp1.pos_z };
          if (_wp1.id) _agentWaypointCache[_wp1safe]['id_' + _wp1.stepno] = _wp1.id;
        }
        var _wp1z = _wp1.zone || _wp1.zone_id || '';
        if (!_wp1z && _wp1c) {
          var cands = [_wp1.id, _wp1.key, _wp1.name, _wp1.label,
                       (_wp1.id||'').toLowerCase(), 'wp'+(_wp1.id||'').toLowerCase(),
                       'wp'+(_wp1.label||'').toLowerCase()];
          for (var _wi = 0; _wi < cands.length; _wi++) {
            if (cands[_wi] && _waypointZoneMap[cands[_wi]]) { _wp1z = _waypointZoneMap[cands[_wi]]; break; }
          }
        }
        if (_wp1c && _wp1z) { _agentZone[_wp1c] = _wp1z; _fireZoneCommand(_wp1c, _wp1z, 'OnEnter', _wp1.stepno||1); }
      });
      _fireCouplerTick();
    }

  } catch(e) {
    pollingActive = true;  // always resume polling on failure
    document.getElementById('pb-step-info').textContent = 'Play All failed: ' + e.message;
    console.error('pbPlayAll: CAUGHT EXCEPTION —', e.message, e.stack);
  }
}

// ─────────────────────────────────────────────
// pbStepSession — advance one named session
// ─────────────────────────────────────────────
// Called from Arrival_ callbacks when concurrent arcs are active.
// Routes the step to the correct server session by session_id.
// Null sessionId falls back to stepping ALL sessions (single-arc compat).

async function pbStepSession(sessionId) {
  var flagKey = sessionId || '__all__';
  if (_pbStepInFlight[flagKey]) {
    console.log('pbStepSession: SKIPPED — in flight (session ' + (sessionId||'all') + ')');
    return;
  }
  _pbStepInFlight[flagKey] = true;
  try {
    var body = sessionId ? JSON.stringify({session_id: sessionId}) : '{}';
    var r = await fetch(API + '/arc/playback/step', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: body
    });
    var data = await r.json();
    // Server returns either a single session state or aggregate; handle both
    var stateData = data;
    if (data.sessions && sessionId && data.sessions[sessionId]) {
      stateData = data.sessions[sessionId];
    }
    pbUpdateDisplay(stateData);
    _seedArcRecord(stateData);
    // Zone tracking
    var _stepWp = stateData.current_waypoint || {};
    var _stepCultivar = _stepWp.cultivar || ((stateData.cultivars||[])[0]) || '';
    var _stepZone = _stepWp.zone || _stepWp.zone_id || '';
    if (!_stepZone) {
      var _cands = [_stepWp.id, _stepWp.key, _stepWp.name, _stepWp.label,
                   (_stepWp.id||'').toLowerCase(),
                   'wp'+(_stepWp.id||'').toLowerCase(),
                   'wp'+(_stepWp.label||'').toLowerCase()];
      for (var _ci = 0; _ci < _cands.length; _ci++) {
        if (_cands[_ci] && _waypointZoneMap[_cands[_ci]]) {
          _stepZone = _waypointZoneMap[_cands[_ci]]; break;
        }
      }
    }
    var _prevZone = _agentZone[_stepCultivar] || '';
    if (_stepZone && _stepZone !== _prevZone) {
      if (_prevZone) _fireZoneCommand(_stepCultivar, _prevZone, 'OnExit', _stepWp.stepno || 0);
      _fireZoneCommand(_stepCultivar, _stepZone, 'OnEnter', _stepWp.stepno || 0);
      _agentZone[_stepCultivar] = _stepZone;
    }
    _fireCouplerTick();
  } catch(e) { console.warn('pbStepSession error:', e); }
  finally { _pbStepInFlight[flagKey] = false; }
}

// ─────────────────────────────────────────────
// Coupler tick — fired at each waypoint arrival
// ─────────────────────────────────────────────
//   1. _seedArcRecord(state) — calls POST /arc/record to write ϕ for each
//      cultivar in the current playback state.  arc/record is the ONLY writer
//      of constitutional_cv (ϕ).  Without this, _agent_runtime is empty and
//      the coupler tick has nothing to act on.
//      CV values come directly from the arc XML waypoint (E/B/P/S attributes
//      recorded during the constitutional navigator session).
//   2. _fireCouplerTick(sceneName) — calls POST /couplers/tick once ϕ is seeded.
//
// pollRuntime() picks up updated ϵ on its next 750ms cycle — the ϕ/ϵ panel
// will show non-zero delta bars after the first waypoint arrival.

function _seedArcRecord(state) {
  // Seeds ϕ (constitutional_cv) so arc/record populates _agent_runtime before
  // the coupler tick runs.  Two paths:
  //   A) Arc XML has E/B/P/S on the waypoint (recorded with today's composer) —
  //      pass them directly as a cv override, bypassing sentiment recomputation.
  //   B) Arc XML has no CV values (recorded before today's composer fix) —
  //      call arc/record with response='' so it computes from cultivar weights.
  //      This seeds ϕ with the cultivar's constitutional baseline, which is
  //      correct and sufficient for the coupler tick to run.
  if (!state || state.status === 'idle') return;
  var wp = state.current_waypoint || {};
  if (!wp.cultivar && state.cultivars && state.cultivars.length) {
    wp.cultivar = state.cultivars[0];
  }
  if (!wp.cultivar) return;

  // Task 4 — Load behavior clips for this cultivar if not already loaded.
  // Fetches GET /cultivars/<name> and stores behavior_clips in _agentBehaviorClips.
  // Runs once per cultivar per session — guard prevents redundant fetches.
  var _bcSafeName = wp.cultivar.replace(/[^A-Za-z0-9_]/g, '_');
  if (!_agentBehaviorClips[_bcSafeName]) {
    (function(safeName, cultivarName) {
      fetch(API + '/cultivars/' + encodeURIComponent(cultivarName))
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data) return;
          if (data.behavior_clips && data.behavior_clips.length) {
            _agentBehaviorClips[safeName] = {
              clips:   data.behavior_clips,
              default: data.behavior_default || 'Default'
            };
            console.log('_seedArcRecord: behavior clips loaded for', cultivarName,
                        '—', data.behavior_clips.length, 'clips');
          } else {
            // No behavior table authored — default to DefaultTimer always running.
            // This is the correct behavior for cultivars without <Behaviors> in their XML.
            _agentBehaviorClips[safeName] = {
              clips:   [{ name:'Default', timerDEF:'DefaultTimer', loop:true, priority:0 }],
              default: 'Default'
            };
            console.log('_seedArcRecord: no behavior clips for', cultivarName, '— DefaultTimer fallback');
          }
        })
        .catch(function() {
          // Network error — set minimal fallback so behavior system doesn't stall
          _agentBehaviorClips[safeName] = {
            clips:   [{ name:'Default', timerDEF:'DefaultTimer', loop:true, priority:0 }],
            default: 'Default'
          };
        });
    })(_bcSafeName, wp.cultivar);
  }

  var body = {
    cultivar: wp.cultivar,
    step:     wp.stepno || state.step || 1,
    response: ''
  };

  // Path A: arc XML has CV values — use them directly
  if (wp.E !== undefined && wp.B !== undefined) {
    body.cv = {
      E: parseFloat(wp.E) || 0.0,
      B: parseFloat(wp.B) || 0.0,
      P: parseFloat(wp.P) || 0.0,
      S: parseFloat(wp.S) || 0.0
    };
  }
  // Path B: no CV values — arc/record will compute from cultivar weights (no cv key needed)

  fetch(API + '/arc/record', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      console.log('_seedArcRecord: ϕ seeded for ' + wp.cultivar
        + (d.cv ? ' E=' + (d.cv.E||0).toFixed(3) + ' B=' + (d.cv.B||0).toFixed(3)
                + ' P=' + (d.cv.P||0).toFixed(3) + ' S=' + (d.cv.S||0).toFixed(3) : ''));
    })
    .catch(function() {});
}

// ─────────────────────────────────────────────
// Zone Command System — V4
// ─────────────────────────────────────────────
// When a waypoint arrival places an agent in a zone that has a matching
// <OnEnter> command, _fireZoneCommand() calls POST /zone/command.
// For LLM agents (actor=ollama): Ollama generates a spoken response
//   from the agent's current observed_cv and zone memory.
//   Response goes to TTS — environmental speech, not scripted dialogue.
// For scripted agents: command is logged and written to zone memory only.
//   The script is holy writ.
//
// Zone commands speak from observed_cv (ϕ + ϵ), not ϕ alone.
// The drama lives in the distance between them.

// Cache parsed zone commands from scene XML: {zone_id: [{event, cultivar, command, duration}]}
var _zoneCommands = {};
// Cache zone descriptors: {zone_id: string}
var _zoneDescriptors = {};
// Cache actor per cultivar from scene XML: {cultivar_name: 'ollama'|'scripted'}
var _cultivarActors = {};
// Cache waypoint name → zone id: {wp_name: zone_id}
var _waypointZoneMap = {};
var _waypointPosMap  = {};   // {wpName: {pos_x, pos_z}} — from scene XML, for pivot lookups
// Track which zones each cultivar currently occupies: {cultivar: zone_id|null}
var _agentZone = {};
// Zone command serial queue — prevents simultaneous Ollama calls timing out.
// Each entry: {cultivar, zoneId, eventType, step}
// Commands are drained one at a time; next fires only when current completes/fails.
var _zoneCommandQueue = [];
var _zoneCommandInFlight = false;

function _parseSceneZoneData() {
  // Parse <Zone><Commands> and <EmotionalArc actor="..."> from the scene XML.
  // The scene XML (_scene.xml) lives on the server — fetch it via
  // GET /scene/load/scene/raw?filename={scene}_scene.xml which returns the raw XML.
  // This runs after x3dFileChanged() — scene name is derivable from the X3D filename.
  var xSel = document.getElementById('x3d-file');
  var fname = xSel ? xSel.value : '';
  var sceneName = fname.replace(/\.x3d$/i, '');
  if (!sceneName) return;

  fetch(API + '/scene/load/scene/raw?filename=' + encodeURIComponent(sceneName + '_scene.xml'))
    .then(function(r) { return r.ok ? r.text() : Promise.reject('fetch failed: ' + r.status); })
    .then(function(xmlText) {
      try {
        var doc = new DOMParser().parseFromString(xmlText, 'text/xml');

        // Parse zone commands and descriptors into temp vars first,
        // then assign atomically — preserves last-good data if new parse is empty.
        var _newZoneCommands = {};
        var _newZoneDescriptors = {};
        doc.querySelectorAll('Zone').forEach(function(zEl) {
          var zid = zEl.getAttribute('id');
          if (!zid) return;
          var descEl = zEl.querySelector('Descriptor');
          _zoneDescriptors[zid] = descEl ? (descEl.textContent||'').trim() : '';
          var cmds = [];
          zEl.querySelectorAll('Commands > OnEnter').forEach(function(el) {
            cmds.push({event:'OnEnter', cultivar: el.getAttribute('cultivar')||'*',
                       command: el.getAttribute('command')||''});
          });
          zEl.querySelectorAll('Commands > OnDwell').forEach(function(el) {
            cmds.push({event:'OnDwell', cultivar: el.getAttribute('cultivar')||'*',
                       command: el.getAttribute('command')||'',
                       duration: parseInt(el.getAttribute('duration')||'0')});
          });
          zEl.querySelectorAll('Commands > OnExit').forEach(function(el) {
            cmds.push({event:'OnExit', cultivar: el.getAttribute('cultivar')||'*',
                       command: el.getAttribute('command')||''});
          });
          if (cmds.length) _newZoneCommands[zid] = cmds;
        });

        // Only assign if we got real data — preserve last-good values otherwise
        if (Object.keys(_newZoneCommands).length > 0) {
          _zoneCommands   = _newZoneCommands;
          _zoneDescriptors = _newZoneDescriptors;
        }

        // Parse cultivar actors from <EmotionalArc actor="ollama">
        var _newCultivarActors = {};
        doc.querySelectorAll('EmotionalArc[cultivar]').forEach(function(el) {
          var name  = el.getAttribute('cultivar');
          var actor = (el.getAttribute('actor')||'scripted').toLowerCase();
          if (name) _newCultivarActors[name] = actor;
        });

        // Assign cultivar actors atomically
        if (Object.keys(_newCultivarActors).length > 0) _cultivarActors = _newCultivarActors;

        // Parse waypoint name → zone mapping for client-side zone derivation
        // Also cache waypoint positions for pivot calculation (keyed by name)
        var _newWaypointZoneMap = {};
        var _newWaypointPosMap  = {};
        doc.querySelectorAll('Waypoint').forEach(function(el) {
          var name = el.getAttribute('name');
          var zone = el.getAttribute('zone');
          var px   = el.getAttribute('pos_x');
          var pz   = el.getAttribute('pos_z');
          if (name && zone) _newWaypointZoneMap[name] = zone;
          if (name && px !== null && pz !== null) {
            var _pos = { pos_x: parseFloat(px), pos_z: parseFloat(pz) };
            _newWaypointPosMap[name.toUpperCase()] = _pos;
            _newWaypointPosMap[name]               = _pos;
          }
        });
        if (Object.keys(_newWaypointZoneMap).length > 0) _waypointZoneMap = _newWaypointZoneMap;
        if (Object.keys(_newWaypointPosMap).length > 0)  _waypointPosMap  = _newWaypointPosMap;

        // Build complete ordered pivot cache from path sequences
        _buildPivotCacheFromSceneXml(doc);

        console.log('Zone commands parsed:', Object.keys(_zoneCommands),
                    'Actors:', _cultivarActors,
                    'WaypointZones:', _waypointZoneMap);
      } catch(e) { console.warn('_parseSceneZoneData parse error:', e); }
    })
    .catch(function(e) { console.warn('_parseSceneZoneData fetch error:', e); });
}

function _matchZoneCommand(zoneId, cultivar, eventType) {
  // Find a matching command for (zoneId, cultivar, eventType).
  // Wildcard '*' matches any cultivar. Specific match takes priority.
  var cmds = _zoneCommands[zoneId];
  if (!cmds) return null;
  var specific = cmds.find(function(c) {
    return c.event === eventType && c.cultivar === cultivar;
  });
  if (specific) return specific;
  var wildcard = cmds.find(function(c) {
    return c.event === eventType && c.cultivar === '*';
  });
  return wildcard || null;
}

function _fireZoneCommand(cultivar, zoneId, eventType, step) {
  // Enqueue a zone command. Commands are dispatched serially — one Ollama call
  // at a time — so concurrent arc arrivals don't cause simultaneous 30s timeout races.
  if (!zoneId) return;
  var cmd = _matchZoneCommand(zoneId, cultivar, eventType);
  if (!cmd || !cmd.command) {
    // No explicit command in scene XML — use default if actor is ollama
    var actor = _cultivarActors[cultivar] || 'scripted';
    if (actor === 'ollama' || actor === 'llm') {
      var defaultCmd = eventType === 'OnEnter' ? 'reflect'
                     : eventType === 'OnExit'  ? 'release'
                     :                           'attend';
      console.log('_fireZoneCommand: no scene XML command — using default', defaultCmd,
                  'for', cultivar, eventType, zoneId);
      cmd = {event: eventType, cultivar: cultivar, command: defaultCmd};
    } else {
      console.log('_fireZoneCommand: no command for', cultivar, eventType, zoneId,
                  '(scripted agent, no default)');
      return;
    }
  }
  _zoneCommandQueue.push({cultivar: cultivar, zoneId: zoneId,
                           eventType: eventType, step: step, cmd: cmd});
  _drainZoneCommandQueue();
}

function _drainZoneCommandQueue() {
  if (_zoneCommandInFlight || _zoneCommandQueue.length === 0) return;
  var item = _zoneCommandQueue.shift();
  var cultivar  = item.cultivar;
  var zoneId    = item.zoneId;
  var eventType = item.eventType;
  var step      = item.step;
  var cmd       = item.cmd;

  var xSel = document.getElementById('x3d-file');
  var fname = xSel ? xSel.value : '';
  var sceneName = fname.replace(/\.x3d$/i, '');
  var actor    = _cultivarActors[cultivar] || 'scripted';
  var zoneDesc = _zoneDescriptors[zoneId] || '';

  console.log('_fireZoneCommand (queued):', cultivar, eventType, zoneId, cmd.command,
              'actor=' + actor, 'queue remaining=' + _zoneCommandQueue.length);

  // Scripted agents don't call Ollama — drain immediately
  if (actor !== 'ollama' && actor !== 'llm') {
    fetch(API + '/zone/command', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        cultivar: cultivar, actor: actor, command: cmd.command,
        event: eventType, zone_id: zoneId, scene: sceneName,
        zone_descriptor: zoneDesc, step: step || 0,
        ollama_model: 'llama3.2', ollama_url: 'http://localhost:11434'
      })
    }).catch(function(){})
      .finally(function(){ _drainZoneCommandQueue(); });
    return;
  }

  _zoneCommandInFlight = true;
  fetch(API + '/zone/command', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      cultivar:        cultivar,
      actor:           actor,
      command:         cmd.command,
      event:           eventType,
      zone_id:         zoneId,
      scene:           sceneName,
      zone_descriptor: zoneDesc,
      step:            step || 0,
      ollama_model:    'llama3.2',
      ollama_url:      'http://localhost:11434'
    })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === 'scripted') {
        console.log('Zone command (scripted, no speech):', cultivar, cmd.command, zoneId);
        return;
      }
      if (d.status === 'error') {
        console.warn('Zone command error:', d.error);
        return;
      }
      if (d.response && d.response.trim()) {
        console.log('Zone command response:', cultivar, cmd.command, '→', d.response.substring(0,60)+'...');
        var voice = null;
        if (_pbSceneVoiceMap && _pbSceneVoiceMap[cultivar]) voice = _pbSceneVoiceMap[cultivar];
        else if (window._pbVoiceMap && window._pbVoiceMap[cultivar]) voice = window._pbVoiceMap[cultivar];
        var utt = new SpeechSynthesisUtterance(d.response);
        if (voice) utt.voice = voice;
        utt.rate = 0.95;
        utt.pitch = 1.0;
        if (speechSynthesis.paused) {
        speechSynthesis.resume();
        console.log('pbSpeakQALines: resumed paused speechSynthesis before speak');
      }
      console.log('pbSpeakQALines: speak()', line.text.substring(0,40),
                  'voice=', utt.voice ? utt.voice.name : 'default',
                  'pending=', speechSynthesis.pending,
                  'paused=', speechSynthesis.paused);
      speechSynthesis.speak(utt);
      }
    })
    .catch(function(e) { console.warn('_fireZoneCommand fetch error:', e); })
    .finally(function() {
      _zoneCommandInFlight = false;
      _drainZoneCommandQueue();
    });
}

function _fireCouplerTick(sceneName) {
  if (!sceneName) {
    var xSel = document.getElementById('x3d-file');
    var fname = xSel ? xSel.value : '';
    sceneName = fname.replace(/\.x3d$/i, '');
  }
  if (!sceneName) return;
  fetch(API + '/couplers/tick', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({scene: sceneName})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      console.log('couplers/tick ts=' + d.timestep
        + ' links=' + d.network_links
        + ' agents=' + d.agents_ticked
        + (d.phase && d.phase.transition ? ' PHASE TRANSITION mean_sim=' + d.phase.mean_similarity : ''));
      // Capture trust data for panel display
      if (d.trust && Object.keys(d.trust).length) {
        window._lastTrustData = d.trust;
        if (_trustExpanded) renderTrust(d.trust);
      }
    })
    .catch(function() {});
}

// Per-session step-in-flight guard. Shared bool caused concurrent Arrival_ callbacks
// to block each other. Keyed by session_id (or '__single__' for pbStep()).
var _pbStepInFlight = {};
async function pbStep() {
  if (_pbStepInFlight['__single__']) { console.log('pbStep: SKIPPED — already in flight (double-fire guard)'); return; }
  _pbStepInFlight['__single__'] = true;
  try {
    const r = await fetch(API+'/arc/playback/step', {method:'POST',
      headers:{'Content-Type':'application/json'}, body:'{}'});
    const state = await r.json();
    pbUpdateDisplay(state);
    _seedArcRecord(state);   // seed ϕ from arc XML waypoint CV values
    // Fire zone OnEnter command if this waypoint's zone has one
    var _stepWp = state.current_waypoint || {};
    var _stepCultivar = _stepWp.cultivar || (state.cultivars && state.cultivars[0]) || '';
    var _stepZone = _stepWp.zone || _stepWp.zone_id || '';
    if (!_stepZone) {
      var _stepCandidates = [_stepWp.id, _stepWp.key, _stepWp.name, _stepWp.label,
                             (_stepWp.id||'').toLowerCase(),
                             'wp' + (_stepWp.id||'').toLowerCase(),
                             'wp' + (_stepWp.label||'').toLowerCase()];
      for (var _si = 0; _si < _stepCandidates.length; _si++) {
        if (_stepCandidates[_si] && _waypointZoneMap[_stepCandidates[_si]]) {
          _stepZone = _waypointZoneMap[_stepCandidates[_si]];
          break;
        }
      }
    }
    var _prevZone = _agentZone[_stepCultivar] || '';
    if (_stepZone && _stepZone !== _prevZone) {
      // Agent has moved into a new zone — fire OnExit for old, OnEnter for new
      if (_prevZone) _fireZoneCommand(_stepCultivar, _prevZone, 'OnExit', _stepWp.stepno||0);
      _fireZoneCommand(_stepCultivar, _stepZone, 'OnEnter', _stepWp.stepno||0);
      _agentZone[_stepCultivar] = _stepZone;
    }
    _fireCouplerTick();      // then run one field tick — ϵ drifts from ϕ
  } catch(e) {}
  finally { _pbStepInFlight['__single__'] = false; }
}
async function pbStop() {
  _agentZone = {};  // reset zone tracking on stop
  pbStopPolling();
  pbStopX3DTimers();
  try { const r=await fetch(API+'/arc/playback/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}); pbUpdateDisplay(await r.json()); } catch(e) {}
}
async function pbReset() {
  console.log('pbReset: called — _x3dTimerActive keys:', Object.keys(_x3dTimerActive));
  pbStopPolling();
  stopChorusPoll();
  dismissChorus();
  // _pbResetViaKillScript reads _x3dTimerActive to find Kill_ nodes —
  // must run BEFORE _x3dTimerActive is cleared.
  _pbResetViaKillScript();
  _lerpDest = {};
  _x3dTimerActive = {};
  _x3dLastArrivedSeg = {};
  _pbLastStepKey = {};
  _pbLastSpoken = {};
  _pbArcComplete = {};
  _pbExpectedAgents = 0;
  _pbLastArcFiles = [];
  _chorusTranscript = [];     // clear transcript on reset
  _chorusFinalCV   = {};
  _pbCultivarSessionMap = {};
  _pbPendingOnComplete = {};
  _pbSpeakToken = {};
  _pbSpeakTimer = {};
  _pbSpeechLock  = false;
  _pbSpeechQueue = [];
  _zoneCommandQueue = [];
  _zoneCommandInFlight = false;
  _chorusLastTimestamp = 0;  // reset so next chorus poll is never stale
  // Task 5 — Behavior clip state reset.
  // Clear per-play clip tracking; preserve timer map and clip config
  // (populated at placement/arc-record — survive reset without re-fetch).
  _agentCurrentClip   = {};
  _agentLastLoopClip  = {};
  _agentWalkStartTime = {};
  _agentWaypointCache  = {};
  // Cancel all pending arrival timeouts on reset
  Object.keys(_agentArrivalTimeout).forEach(function(k) {
    if (_agentArrivalTimeout[k]) clearTimeout(_agentArrivalTimeout[k]);
  });
  _agentArrivalTimeout = {};
  try {
    const r=await fetch(API+'/arc/playback/reset',{
      method:'POST',headers:{'Content-Type':'application/json'},body:'{}',
      signal:AbortSignal.timeout(8000)
    });
    pbUpdateDisplay(await r.json());
    var qr=document.getElementById('pb-qr'); if(qr) qr.style.display='none';
    console.log('pbReset: server reset complete — firing pbPlayAll');
    pbPlayAll();
  } catch(e) {
    console.warn('pbReset: server reset timed out or failed —', e.message, '— JS state already cleared — firing pbPlayAll anyway');
    var qr=document.getElementById('pb-qr'); if(qr) qr.style.display='none';
    pbPlayAll();
  }
}

function _pbResetViaKillScript() {
  if (!canvas || !canvas.browser) { resetToStartPosition(); return; }
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) { resetToStartPosition(); return; }
    // Derive Kill_ node names from _x3dTimerActive (Avatar_X -> Kill_X)
    // Does NOT use scene.namedNodes — Script nodes not reliably enumerated by X_ITE SAI.
    var agentSuffixes = Object.keys(_x3dTimerActive).map(function(n){ return n.replace(/^Avatar_/,''); });
    // Also check polling segment names as fallback
    if (agentSuffixes.length === 0 && window._pbPollingSegment) {
      Object.keys(window._pbPollingSegment).forEach(function(n){
        var m = n.match(/^Arrival_(.+)$/);
        if (m) agentSuffixes.push(m[1]);
      });
    }
    var found = false;
    agentSuffixes.forEach(function(suffix) {
      var nodeName = 'Kill_' + suffix;
      try {
        var killNode = scene.getNamedNode(nodeName);
        if (!killNode) return;
        killNode.resetPos = true;
        found = true;
        console.log('pbReset: fired resetPos on', nodeName);
      } catch(e) { console.warn('pbReset: Kill_ resetPos failed on', nodeName, e); }
    });
    if (!found) {
      console.warn('pbReset: no Kill_ scripts found — falling back to JS resetToStartPosition');
      resetToStartPosition();
    }
  } catch(e) { console.warn('_pbResetViaKillScript error:', e); resetToStartPosition(); }
}

function pbStartPolling(pace) {
  pbStopPolling();
  pbPolling=true;
  // Poll at 1/3 of pace so we never miss a step on display
  var interval=Math.max(400, Math.round((pace/3)*1000));
  pbPollTimer=setInterval(pbPollState,interval);
}
function pbStopPolling() {
  pbPolling=false;
  if(pbPollTimer){clearInterval(pbPollTimer);pbPollTimer=null;}
}
async function pbPollState() {
  try {
    const r=await fetch(API+'/arc/playback/state');
    const data=await r.json();
    pbUpdateDisplay(data);
    if(data.status==='complete'||data.status==='idle') pbStopPolling();
  } catch(e) {}
}

function pbUpdateDisplay(state) {
  if (!state||state.status==='idle') {
    var el=document.getElementById('pb-step-info'); if(el) el.textContent='Idle.';
    var qr=document.getElementById('pb-qr'); if(qr) qr.style.display='none';
    return;
  }
  var wp=state.current_waypoint||{};
  // Cache waypoint position for pivot calculation, keyed by stepno
  if (wp.cultivar && wp.stepno !== undefined) {
    var _pivSafe = wp.cultivar.replace(/[^A-Za-z0-9_]/g, '_');
    if (!_agentWaypointCache[_pivSafe]) _agentWaypointCache[_pivSafe] = {};
    var _pivPos = null;
    if (wp.pos_x !== undefined) {
      _pivPos = { pos_x: wp.pos_x, pos_z: wp.pos_z };
    } else if (wp.id && _waypointPosMap[wp.id]) {
      _pivPos = _waypointPosMap[wp.id];
    }
    if (_pivPos) {
      _agentWaypointCache[_pivSafe][wp.stepno] = _pivPos;
      // Also store waypoint name so pivot can fall back to _waypointPosMap
      if (wp.id) _agentWaypointCache[_pivSafe]['id_' + wp.stepno] = wp.id;
    }
  }
  // Inject cultivar into wp if server didn't include it (arc XML waypoints carry no cultivar attr)
  if (!wp.cultivar && state.cultivars && state.cultivars.length) {
    wp.cultivar = state.cultivars[0];
  }
  var step=wp.stepno||state.step||0;
  var total=state.total_steps||'?';
  var cultivar=wp.cultivar||(state.cultivars||[]).join(', ')||'';
  var status=state.status||'';
  var sym=status==='playing'?'⏵':status==='paused'?'⏸':status==='complete'?'⏹':'○';
  var si=document.getElementById('pb-step-info');
  if(si) si.innerHTML=sym+' <b>'+cultivar+'</b> &nbsp; step '+step+' / '+total
    +(wp.id?' &nbsp;<span style="color:#4a6070">'+wp.id+'</span>':'')
    +(wp.pos_x!==undefined?' &nbsp;<span style="color:#4a6070;font-size:10px">X='+parseFloat(wp.pos_x).toFixed(1)+' Z='+parseFloat(wp.pos_z||0).toFixed(1)+'</span>':'');
  var ch=document.getElementById('pb-channels');
  if(ch&&wp.E!==undefined) ch.innerHTML=
    '<span class="pc-E">E '+(wp.E||0).toFixed(2)+'</span>'+
    '<span class="pc-B">B '+(wp.B||0).toFixed(2)+'</span>'+
    '<span class="pc-P">P '+(wp.P||0).toFixed(2)+'</span>'+
    '<span class="pc-S">S '+(wp.S||0).toFixed(2)+'</span>';
  var qr=document.getElementById('pb-qr');
  var qaLines=wp.qaLines||wp.qa_lines||[];  // server serializes as qaLines; qa_lines fallback for legacy arcs
  if(qaLines.length||wp.question||wp.response){
    if(qr) qr.style.display='block';
    var qEl=document.getElementById('pb-question');
    var rEl=document.getElementById('pb-response');
    if(qaLines.length){
      var allText=qaLines.filter(function(l){return l.text&&l.text.trim();})
        .map(function(l){
          var p=l.type==='Question'?'Q':l.type==='Response'?'R':'—';
          return p+(l.speaker?' ['+l.speaker+']':'')+': '+l.text;
        }).join('\n');
      // In pbPlayAll mode, prefix with cultivar name and append rather than overwrite
      var displayText = (_pbExpectedAgents > 1)
        ? '[' + cultivar + '] ' + allText
        : allText;
      if(qEl) {
        if (_pbExpectedAgents > 1 && qEl.textContent && qEl.textContent.trim()) {
          qEl.textContent = qEl.textContent + '\n' + displayText;
        } else {
          qEl.textContent = displayText;
        }
      }
      if(rEl) rEl.textContent='';
      // TTS fired after lerp delay below
    } else {
      if(qEl) qEl.textContent=wp.question?'Q: '+wp.question:'';
      if(rEl) rEl.textContent=wp.response?wp.response:'';
      // TTS fired after lerp delay below
    }
  } else { if(qr) qr.style.display='none'; }
  var pace2 = parseFloat((document.getElementById('pb-pace')||{}).value) || 3.0;
  // Step key is per-cultivar — prevents one cultivar's arrival from suppressing another's TTS
  var safeName2 = (wp.cultivar||'').replace(/[^A-Za-z0-9_]/g,'_');
  var stepKey = safeName2 + ':' + String(wp.stepno || state.step || wp.id || '');
  var isNewStep = (stepKey !== (_pbLastStepKey[safeName2] || ''));
  if (isNewStep) _pbLastStepKey[safeName2] = stepKey;
  // Accumulate transcript for Chorus — collect every new-step dialogue line as it plays
  if (isNewStep && qaLines.length) {
    var _wpLabel = wp.id || wp.label || ('step' + (wp.stepno || step));
    qaLines.filter(function(l){return l.text && l.text.trim();}).forEach(function(l){
      _chorusTranscript.push({label: _wpLabel, speaker: l.speaker || cultivar, text: l.text.trim()});
    });
    // Track CV of most recent waypoint — will be final CV when last agent completes
    if (wp.E !== undefined) _chorusFinalCV = {E: wp.E||0, B: wp.B||0, P: wp.P||0, S: wp.S||0};
  }
  // TTS fires on new step regardless of whether position is X3D-driven or JS-lerped.
  // Decoupled from _x3dTimerActive — dialogue is MCCF domain, not X3D domain.
  if (isNewStep && (qaLines.length || wp.question || wp.response)) {
    clearTimeout(_pbSpeakTimer[safeName2]);
    var isX3DDriven = !!_x3dTimerActive['Avatar_' + safeName2];
    // X3D-driven: short settle delay before TTS so renderer catches up.
    // JS-lerp: delay by pace so avatar arrives before speaking.
    var ttsDelay = isX3DDriven ? 1000 : Math.round(pace2 * 1000);
    _pbSpeakTimer[safeName2] = setTimeout(function() {
      if (qaLines.length) {
        if (isX3DDriven) {
          console.log('pbUpdateDisplay: firing TTS for', safeName2, qaLines.length, 'lines, isX3DDriven=', isX3DDriven);
          pbSpeakQALines(qaLines, function() { pbReleaseDwell(safeName2); }, safeName2);
        } else {
          pbSpeakQALines(qaLines, null, safeName2);
        }
      } else if (wp.response) {
        pbSpeak(wp.response);
        if (isX3DDriven) setTimeout(function(){ pbReleaseDwell(safeName2); }, 500);
      }
    }, ttsDelay);
  } else if (isNewStep && isX3DDriven) {
    // No dialogue at this waypoint — release dwell immediately so avatar keeps moving
    var safeName3 = (wp.cultivar||'').replace(/[^A-Za-z0-9_]/g,'_');
    var isX3DDriven2 = !!_x3dTimerActive['Avatar_' + safeName3];
    if (isX3DDriven2) setTimeout(function(){ pbReleaseDwell(safeName3); }, 100);
  }
  pbPushPosition(wp);
}

// pbUpdateDisplayFinal — displays and speaks the last waypoint only.
// Called from pbReleaseDwell when the last dwell expires and no next timer exists.
// Does NOT call pbReleaseDwell after TTS — arc is already complete.
function pbUpdateDisplayFinal(state, fireChorus) {
  if (!state || state.status === 'idle') return;
  var wp = state.current_waypoint || {};
  if (!wp.cultivar && state.cultivars && state.cultivars.length) {
    wp.cultivar = state.cultivars[0];
  }
  // Update the display panel
  var si = document.getElementById('pb-step-info');
  if (si) {
    var step = wp.stepno || state.step || 0;
    var total = state.total_steps || '?';
    si.innerHTML = '⏹ <b>' + (wp.cultivar||'') + '</b> &nbsp; step ' + step + ' / ' + total
      + (wp.id ? ' &nbsp;<span style="color:#4a6070">' + wp.id + '</span>' : '');
  }
  var qaLines = wp.qaLines || wp.qa_lines || [];
  var qr = document.getElementById('pb-qr');
  if (qaLines.length) {
    if (qr) qr.style.display = 'block';
    var qEl = document.getElementById('pb-question');
    if (qEl) qEl.textContent = qaLines.filter(function(l){return l.text&&l.text.trim();})
      .map(function(l){
        var p = l.type==='Question'?'Q':l.type==='Response'?'R':'—';
        return p + (l.speaker?' ['+l.speaker+']':'') + ': ' + l.text;
      }).join('\n');
    var rEl = document.getElementById('pb-response');
    if (rEl) rEl.textContent = '';
    // Speak final waypoint lines — no onComplete callback, arc is done.
    var finalSafeName = (wp.cultivar||'').replace(/[^A-Za-z0-9_]/g,'_');
    console.log('pbUpdateDisplayFinal: speaking final waypoint', wp.id, qaLines.length, 'lines');
    pbSpeakQALines(qaLines, null, finalSafeName);
    // Accumulate final waypoint into transcript
    var _finalLabel = wp.id || wp.label || ('step' + (wp.stepno || 0));
    qaLines.filter(function(l){return l.text && l.text.trim();}).forEach(function(l){
      var _fSpeaker = l.speaker || (wp.cultivar||'').replace(/[^A-Za-z0-9_]/g,'_');
      // Avoid duplicating if pbUpdateDisplay already captured this step
      var _fKey = _finalLabel + '|' + _fSpeaker + '|' + l.text.trim();
      var _alreadyIn = _chorusTranscript.some(function(e){
        return e.label === _finalLabel && e.speaker === _fSpeaker && e.text === l.text.trim();
      });
      if (!_alreadyIn) _chorusTranscript.push({label: _finalLabel, speaker: _fSpeaker, text: l.text.trim()});
    });
    if (wp.E !== undefined) _chorusFinalCV = {E: wp.E||0, B: wp.B||0, P: wp.P||0, S: wp.S||0};
  } else if (qr) {
    qr.style.display = 'none';
  }
  pbPushPosition(wp);
  _fireCouplerTick();
  // Fire Chorus only when explicitly requested (all agents complete in pbPlayAll,
  // or single-arc complete in pbPlay).
  if (fireChorus !== false) {
    // Build plain-text transcript from lines accumulated during this run.
    // Format: [waypoint_label] Speaker: "text"
    var _transcriptText = _chorusTranscript.map(function(e){
      return '[' + e.label + '] ' + e.speaker + ': "' + e.text + '"';
    }).join('\n');

    if (_transcriptText) {
      // Scene name from the x3d-file selector (strip .x3d extension)
      var _xSel = document.getElementById('x3d-file');
      var _sceneName = _xSel ? (_xSel.value || '').replace(/\.x3d$/i, '') : '';

      console.log('pbUpdateDisplayFinal: firing Chorus — transcript lines:', _chorusTranscript.length,
                  'cv:', JSON.stringify(_chorusFinalCV));
      fetch(API + '/chorus/fire', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          transcript:  _transcriptText,
          cv:          _chorusFinalCV,
          scene_name:  _sceneName
        })
      }).then(function(r) {
        console.log('chorus/fire response status:', r.status);
        return r.json();
      }).then(function(d) {
        console.log('chorus/fire response:', JSON.stringify(d).slice(0,200));
      }).catch(function(e) {
        console.warn('chorus/fire fetch error:', e.message);
      });
      startChorusPoll();
    } else {
      console.log('pbUpdateDisplayFinal: no transcript — Chorus skipped');
    }
  }
}

// Fetch and cache the scene XML when the X3D scene loads
canvas.addEventListener('load', function() {
  var src = canvas.getAttribute('src') || 'mccf_scene.x3d';
  fetch(src)
    .then(function(r){ if(r.ok) return r.text(); throw new Error('fetch failed'); })
    .then(function(txt){ window._loadedSceneXml = txt; _pbSceneVoiceMap = null; })
    .catch(function(e){ console.warn('Could not cache scene XML:', e); });
});

function resetToStartPosition() {
  _refreshAvatarNodeNames();
  // Prefer scene definition XML (has EmotionalArc+StartPosition)
  // Fall back to cached X3D scene XML
  var xmlText = window._loadedSceneDefXml || window._loadedSceneXml;
  if (xmlText) {
    _applyStartPosition(xmlText);
    return;
  }
  // Try fetching scene XML now if not cached
  var src = (canvas && canvas.getAttribute('src')) || '/static/mccf_scene.x3d';
  fetch(src)
    .then(function(r){ return r.ok ? r.text() : Promise.reject('fetch failed'); })
    .then(function(txt){
      window._loadedSceneXml = txt;
      _applyStartPosition(txt);
    })
    .catch(function(){
      console.warn('resetToStartPosition: could not fetch scene XML — snapping to first arc waypoint or origin');
      _snapToFirstArcWaypoint();
    });
}

function _snapToFirstArcWaypoint() {
  // If an arc is loaded, use its first waypoint position as a better fallback than 0,0,0
  var firstWp = window._pbFirstWaypoint;
  if (firstWp && firstWp.pos_x !== undefined) {
    _moveAvatars(parseFloat(firstWp.pos_x)||0, 0, parseFloat(firstWp.pos_z)||0);
  } else {
    _snapAvatarsToOrigin();
  }
}

function _refreshAvatarNodeNames() {
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var names = window._avatarNodeNames || [];
    // Also scan for any Avatar_ nodes not yet registered
    var extras = [];
    try {
      // Try iterating scene named nodes (X_ITE specific)
      var allNames = scene.namedNodes ? Object.keys(scene.namedNodes) : [];
      allNames.forEach(function(n){
        if (n.startsWith('Avatar_') && names.indexOf(n) === -1) extras.push(n);
      });
    } catch(e) {}
    if (extras.length) window._avatarNodeNames = names.concat(extras);
  } catch(e) {}
}

function _applyStartPosition(xmlText) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(xmlText, 'text/xml');
  // Each <EmotionalArc cultivar="X"> has its own <StartPosition x y z>
  // Move each avatar to its own start, not all to the same point.
  var arcs = doc.querySelectorAll('EmotionalArc[cultivar]');
  if (!arcs.length) {
    // Fallback: single <StartPosition> moves all avatars
    var sp = doc.querySelector('StartPosition');
    if (!sp) {
      console.warn('resetToStartPosition: no StartPosition in scene XML — snapping to origin');
      _snapAvatarsToOrigin();
      return;
    }
    _moveAvatars(parseFloat(sp.getAttribute('x')||0), parseFloat(sp.getAttribute('y')||0), parseFloat(sp.getAttribute('z')||0));
    return;
  }
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    arcs.forEach(function(arc) {
      var cultivar = arc.getAttribute('cultivar');
      var sp = arc.querySelector('StartPosition');
      if (!cultivar || !sp) return;
      var x = parseFloat(sp.getAttribute('x')||0);
      var y = parseFloat(sp.getAttribute('y')||0);
      var z = parseFloat(sp.getAttribute('z')||0);
      var suffix = cultivar.replace(/[^A-Za-z0-9_]/g,'_');
      var node = scene.getNamedNode('Avatar_' + suffix);
      if (node) {
        node.translation = new X3D.SFVec3f(x, y, z);
        console.log('resetToStartPosition:', 'Avatar_'+suffix, '->', x, y, z);
      } else {
        console.warn('resetToStartPosition: node not found for cultivar:', cultivar);
      }
    });
  } catch(e) { console.warn('_applyStartPosition error:', e); }
}

function _snapAvatarsToOrigin() {
  // Move all known avatars to 0,0,0 as a safe fallback
  _moveAvatars(0, 0, 0);
  console.log('resetToStartPosition: snapped to origin (no StartPosition found)');
}

function _moveAvatars(x, y, z) {
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var names = window._avatarNodeNames || [];
    if (!names.length) {
      console.warn('_moveAvatars: no avatar names registered yet');
      return;
    }
    names.forEach(function(name) {
      try {
        var node = scene.getNamedNode(name);
        if (node) {
          node.translation = new X3D.SFVec3f(x, y, z);
          console.log('Moved', name, 'to', x, y, z);
        } else {
          console.warn('_moveAvatars: node not found:', name);
        }
      } catch(e) { console.warn('_moveAvatars:', name, e.message); }
    });
  } catch(e) { console.warn('_moveAvatars error:', e); }
}

// Cache scene XML and avatar node names when playback file changes or scene loads.
// Called from pbLoadFiles after the arc metadata arrives.
function cacheSceneContext(files) {
  // Collect all Avatar_ DEF names from the X3D scene
  try {
    var scene = canvas.browser.currentScene;
    if (scene) {
      var names = [];
      // Walk named nodes looking for Avatar_ prefix
      // X_ITE doesn't expose a full node iterator — use the arc file metadata instead
      (files || []).forEach(function(f) {
        if (f.cultivar) {
          var sn = f.cultivar.replace(/[^A-Za-z0-9_]/g,'_');
          var nodeName = 'Avatar_' + sn;
          if (names.indexOf(nodeName) === -1) names.push(nodeName);
        }
      });
      window._avatarNodeNames = names;
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────
// X3D scene file selector
// ─────────────────────────────────────────────
async function x3dLoadFiles() {
  try {
    const r = await fetch(API + '/scene/x3d/list');
    const data = await r.json();
    const sel = document.getElementById('x3d-file');
    if (!sel) return;
    var current = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    (data.files || []).forEach(function(fname) {
      var opt = document.createElement('option');
      opt.value = fname;
      opt.textContent = fname;
      sel.appendChild(opt);
    });
    // Restore previous selection or auto-select first file
    if (current && [...sel.options].some(o => o.value === current)) {
      sel.value = current;
    } else if (sel.options.length > 1) {
      sel.selectedIndex = 1;
      x3dFileChanged();
    }
  } catch(e) {
    console.warn('x3dLoadFiles: could not reach /scene/x3d/list', e);
  }
}

function x3dFileChanged() {
  var sel = document.getElementById('x3d-file');
  if (!sel) return;
  var fname = sel.value;
  if (!fname) return;
  var canvas = document.getElementById('x3d');
  if (!canvas) return;
  canvas.src = API + '/static/x3d/' + fname;
  console.log('x3dFileChanged: loaded', fname);
  // Notify server so ChorusManager can load config from matching scene XML.
  var sceneName = fname.replace(/\.x3d$/i, '');
  fetch(API + '/chorus/load', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({scene_name: sceneName})
  }).then(function(r){ return r.json(); })
    .then(function(d){ console.log('Chorus config:', JSON.stringify(d)); })
    .catch(function(){});
  // Parse zone commands and actor types from scene XML after scene loads
  setTimeout(_parseSceneZoneData, 500);
}

window.addEventListener('load', function() {
  setTimeout(function() {
    x3dLoadFiles();
    pbLoadFiles();
  }, 800);
});

// ─────────────────────────────────────────────
// Greek Chorus — overlay display (v1)
// ─────────────────────────────────────────────

var _chorusLastTimestamp = 0;
var _chorusPollTimer = null;

/**
 * startChorusPoll() — called from pbUpdateDisplayFinal() at arc-complete.
 * Polls /chorus/state until a new response arrives (up to 90 s).
 * Async: LLM latency is covered while audience watches the final pose.
 */
function startChorusPoll() {
  stopChorusPoll();
  var deadline = Date.now() + 90000;
  _chorusPollTimer = setInterval(function() {
    if (Date.now() > deadline) { stopChorusPoll(); return; }
    fetch(API + '/chorus/state', {signal: AbortSignal.timeout(2000)})
      .then(function(r) { return r.json(); })
      .then(function(d) {
        // Show if text is non-empty and newer than last displayed
        if (d.text && d.timestamp > _chorusLastTimestamp) {
          _chorusLastTimestamp = d.timestamp;
          console.log('Chorus poll: got response —', d.text.substring(0,60));
          displayChorus(d);
          stopChorusPoll();
        } else if (d.text) {
          console.log('Chorus poll: text present but stale timestamp', d.timestamp, 'vs', _chorusLastTimestamp);
        }
      })
      .catch(function(e) { console.warn('Chorus poll error:', e.message); });
  }, 800);
}

function stopChorusPoll() {
  if (_chorusPollTimer) { clearInterval(_chorusPollTimer); _chorusPollTimer = null; }
}

function displayChorus(data) {
  var overlay = document.getElementById('chorus-overlay');
  var textEl  = document.getElementById('chorus-text');
  var zoneEl  = document.getElementById('chorus-zone-label');
  if (!overlay || !textEl) return;

  textEl.textContent = data.text || '';
  if (zoneEl) zoneEl.textContent = data.zone_id ? ('[ ' + data.zone_id.toUpperCase() + ' ]') : '';

  overlay.style.display = 'block';
  // Reset CSS animation so fade-in replays each time
  overlay.style.animation = 'none';
  void overlay.offsetWidth;
  overlay.style.animation = '';

  // Auto-dismiss: scale with text length (~60ms/word, min 18s, max 60s)
  clearTimeout(window._chorusAutoDismiss);
  var wordCount = (data.text || '').split(/\s+/).filter(Boolean).length;
  var dismissMs = Math.min(60000, Math.max(18000, wordCount * 60));
  console.log('Chorus auto-dismiss in', dismissMs, 'ms (', wordCount, 'words)');
  window._chorusAutoDismiss = setTimeout(dismissChorus, dismissMs);

  // v2 hook — if server returns display="x3d" and a viewpoint, cut camera.
  // Viewpoint cut IS the coverage for LLM latency per Day 12 design.
  if (data.display === 'x3d' && data.viewpoint) {
    gotoVP(data.viewpoint);
  }

  console.log('Chorus displayed:', data.text);
}

function dismissChorus() {
  var overlay = document.getElementById('chorus-overlay');
  if (overlay) overlay.style.display = 'none';
  clearTimeout(window._chorusAutoDismiss);
  // Clear server state so stale text doesn't re-appear on next arc
  fetch(API + '/chorus/clear', {method: 'POST'}).catch(function() {});
}
