<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCCF X3D Scene</title>
<script defer src="https://cdn.jsdelivr.net/npm/x_ite@11.6.6/dist/x_ite.min.js"></script>
<style>
body { margin: 0; background: #0a0a0f; font-family: monospace; }
x3d-canvas { width: 100vw; height: 88vh; display: block; }
#controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.88);
  padding: 6px 14px;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  z-index: 100;
}
button {
  background: #1a2030; color: #4af0a8;
  border: 1px solid #4af0a8; border-radius: 3px;
  padding: 3px 10px; cursor: pointer;
  font-family: monospace; font-size: 11px;
}
button:hover { background: #4af0a8; color: #111; }
button.active { background: #4af0a8; color: #111; }
#status { color: #6a7890; font-size: 11px; margin-left: auto; }
#poll-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  background: #333; display: inline-block; margin-right: 4px;
  transition: background 0.2s;
}
#field-overlay {
  position: fixed; top: 8px; right: 8px;
  background: rgba(0,0,0,0.75);
  border: 1px solid #2a3545;
  padding: 8px 12px;
  font-size: 10px; color: #6a8090;
  border-radius: 3px; min-width: 180px; z-index: 100;
}
#field-overlay .row { display: flex; justify-content: space-between; margin: 2px 0; }
#field-overlay .val { color: #a0c0d0; }
.tension-low { color: #4a8adf; }
.tension-mid { color: #4adfc0; }
.tension-high { color: #df8a4a; }
.tension-crit { color: #df4a4a; }
/* ── ϕ/ϵ runtime display ── */
#runtime-panel {
  margin-top: 6px;
  border-top: 1px solid #1c2238;
  padding-top: 5px;
}
#runtime-toggle {
  color: #7ab8f5; font-size: 10px; cursor: pointer;
  user-select: none; display: block; margin-bottom: 3px;
}
#runtime-toggle:hover { color: #a0d0f8; }
#runtime-agents { display: block; }
.rt-agent {
  margin-top: 4px; padding-top: 3px;
  border-top: 1px solid #161e2c;
}
.rt-agent-name {
  color: #c0d0e0; font-size: 10px; margin-bottom: 2px;
}
.rt-bars { display: flex; flex-direction: column; gap: 1px; }
.rt-row { display: flex; align-items: center; gap: 3px; font-size: 9px; }
.rt-ch  { width: 8px; text-align: right; }
.rt-bar-wrap {
  flex: 1; height: 4px; background: #0d1520;
  border-radius: 2px; overflow: hidden; position: relative;
}
.rt-bar-phi {
  position: absolute; top: 0; left: 0; height: 100%;
  background: #3a6090; border-radius: 2px;
  transition: width 0.4s ease;
}
.rt-bar-eps {
  position: absolute; top: 0; left: 0; height: 100%;
  background: #60d090; border-radius: 2px; opacity: 0.75;
  transition: width 0.4s ease;
}
.rt-val { width: 32px; text-align: right; color: #6a8090; }
.rt-drift-pos { color: #60d090; }
.rt-drift-neg { color: #f07060; }
.rt-drift-zero { color: #2a3a4a; }
.rt-meta { font-size: 9px; color: #3a5060; margin-top: 2px; }
/* ── Greek Chorus overlay ── */
#chorus-overlay {
  display: none;
  position: fixed;
  bottom: 60px; left: 50%; transform: translateX(-50%);
  max-width: 560px; width: 90%;
  background: rgba(4, 6, 14, 0.90);
  border: 1px solid #3a2060;
  border-radius: 4px;
  padding: 14px 18px;
  color: #c8a8f0;
  font-family: monospace; font-size: 14px; line-height: 1.6;
  text-align: center;
  z-index: 200;
  animation: chorusFadeIn 1.2s ease;
}
#chorus-overlay .chorus-zone {
  font-size: 10px; color: #6a4090; margin-bottom: 6px; letter-spacing: 0.12em;
}
#chorus-overlay .chorus-dismiss {
  display: block; margin-top: 10px;
  font-size: 10px; color: #5a3080; cursor: pointer; letter-spacing: 0.1em;
}
#chorus-overlay .chorus-dismiss:hover { color: #c8a8f0; }
@keyframes chorusFadeIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
#playback-panel {
  position: fixed; top: 8px; left: 8px;
  background: rgba(0,0,0,0.82);
  border: 1px solid #2a3545;
  padding: 10px 12px;
  font-size: 12px; color: #a0b8c8;
  border-radius: 4px; min-width: 220px;
  max-width: 280px; z-index: 100;
}
#playback-panel .ph { color:#7ab8f5; font-size:13px; margin-bottom:6px; font-weight:bold; }
#playback-panel select, #playback-panel input[type=number] {
  width:100%; background:#0d1520; color:#c0d8e8;
  border:1px solid #2a3545; border-radius:3px;
  padding:3px 5px; font-family:monospace; font-size:12px;
  margin-bottom:5px; box-sizing:border-box;
}
#playback-panel .pb-row { display:flex; gap:4px; margin-bottom:5px; }
#playback-panel .pb-row button { flex:1; font-size:12px; padding:4px 4px; }
#pb-step-info {
  margin-top:6px; border-top:1px solid #1c2538; padding-top:6px;
  font-size:13px; color:#9ab0b0; min-height:40px;
}
#pb-qr {
  margin-top:6px; border-top:1px solid #1c2538; padding-top:6px;
  display:none;
}
#pb-question { color:#f0c060; margin-bottom:4px; font-style:italic; font-size:13px; white-space:pre-wrap; max-height:160px; overflow-y:auto; }
#pb-response  { color:#c0d8e8; line-height:1.5; font-size:13px;
                max-height:120px; overflow-y:auto; }
#pb-channels  { display:flex; gap:6px; margin-top:4px; }
#pb-channels span { font-size:11px; }
.pc-E { color:#f07060; } .pc-B { color:#60a8f0; }
.pc-P { color:#f0c060; } .pc-S { color:#60f0a8; }
</style>
</head>
<body>

<x3d-canvas id="x3d" update="auto" contentScale="auto"></x3d-canvas>

<div id="field-overlay">
  <div style="color:#7ab8f5;margin-bottom:4px;font-size:11px;">⬡ MCCF FIELD</div>
  <div class="row"><span>coherence</span><span class="val" id="ov-coh">—</span></div>
  <div class="row"><span>echo risk</span><span class="val" id="ov-echo">—</span></div>
  <div class="row"><span>episodes</span><span class="val" id="ov-ep">—</span></div>
  <div class="row"><span>agents</span><span class="val" id="ov-agents">—</span></div>
  <div class="row"><span>tension</span><span class="val" id="ov-tension">—</span></div>
  <div style="margin-top:4px;color:#aab0be;font-size:11px;" id="ov-poll">polling…</div>
  <div style="color:#aab0be;font-size:11px;margin-top:2px;" id="x3d-diag">hothouse: waiting…</div>
  <div style="color:#aab0be;font-size:11px;margin-top:2px;" id="light-diag">lighting: waiting…</div>
  <div style="color:#f0c060;font-size:11px;margin-top:4px;border-top:1px solid #1c2238;padding-top:4px;" id="sai-test">SAI test: not run</div>
  <button onclick="runSAITest()" style="margin-top:4px;font-family:var(--mono);font-size:10px;
    padding:2px 6px;border:1px solid #1c2238;border-radius:3px;background:none;
    color:#f0c060;cursor:pointer;">▶ Test SAI</button>
  <!-- ϕ/ϵ runtime display -->
  <div id="runtime-panel">
    <span id="runtime-toggle" onclick="toggleRuntime()">▶ ϕ/ϵ state</span>
    <div id="runtime-agents" style="display:none;"></div>
  </div>
</div>

<div id="playback-panel">
  <div class="ph">⏵ PLAYBACK</div>
  <div style="font-size:10px;color:#6a8090;margin-bottom:2px;">X3D Scene</div>
  <select id="x3d-file" onchange="x3dFileChanged()">
    <option value="">— select scene —</option>
  </select>
  <div style="display:flex;gap:4px;margin-bottom:5px;">
    <button onclick="x3dLoadFiles()" style="flex:1;background:none;border:1px solid #2a3545;border-radius:3px;padding:2px 6px;font-family:monospace;font-size:11px;color:#7ab8f5;cursor:pointer;">&#8635; Refresh</button>
  </div>
  <div style="font-size:10px;color:#6a8090;margin-bottom:2px;">Arc</div>
  <select id="pb-file" onchange="pbFileChanged()">
    <option value="">— select arc file —</option>
  </select>
  <div style="display:flex;gap:4px;margin-bottom:5px;">
    <button onclick="pbLoadFiles()" style="flex:1;background:none;border:1px solid #2a3545;border-radius:3px;padding:2px 6px;font-family:monospace;font-size:11px;color:#7ab8f5;cursor:pointer;">&#8635; Refresh</button>
    <button onclick="pbClearSelect()" style="flex:1;background:none;border:1px solid #2a3545;border-radius:3px;padding:2px 6px;font-family:monospace;font-size:11px;color:#f06060;cursor:pointer;">&#10005; Clear</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
    <label style="font-size:12px;color:#6a8090;white-space:nowrap;margin:0;">pace (s)</label>
    <input type="number" id="pb-pace" value="3" min="0.5" max="30" step="0.5" style="width:60px;"/>
    <label style="font-size:12px;color:#6a8090;white-space:nowrap;margin:0;">
      <input type="checkbox" id="pb-loop" style="width:auto;margin:0 3px 0 0;"/>loop
    </label>
  </div>
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
    <label style="font-size:12px;color:#6a8090;white-space:nowrap;margin:0;">
      <input type="checkbox" id="pb-voice" style="width:auto;margin:0 3px 0 0;" onchange="pbVoiceChanged()"/>voice
    </label>
  </div>
  <div class="pb-row">
    <button id="pb-play-btn" onclick="pbPlay()" style="border-color:#4af0a8;color:#4af0a8;">&#9654; Play Scene Arc</button>
    <button id="pb-step-btn" onclick="pbStep()" style="border-color:#7ab8f5;color:#7ab8f5;">&#9654;&#9654; Step</button>
    <button id="pb-stop-btn" onclick="pbStop()" style="border-color:#f0c060;color:#f0c060;">&#9646;&#9646; Stop</button>
    <button id="pb-reset-btn" onclick="pbReset()" style="border-color:#a0a0a0;color:#a0a0a0;">&#8635; Reset</button>
  </div>
  <div style="margin-bottom:5px;">
    <button onclick="resetToStartPosition()" style="width:100%;border-color:#c080f0;color:#c080f0;background:none;border:1px solid #c080f0;border-radius:3px;padding:3px 6px;font-family:monospace;font-size:11px;cursor:pointer;">&#8602; Reset Position</button>
  </div>
  <div id="pb-step-info">No arc loaded.</div>
  <div id="pb-channels">
    <span class="pc-E">E —</span>
    <span class="pc-B">B —</span>
    <span class="pc-P">P —</span>
    <span class="pc-S">S —</span>
  </div>
  <div id="pb-qr">
    <div id="pb-question"></div>
    <div id="pb-response"></div>
  </div>
</div>

<!-- Greek Chorus overlay — text injected by displayChorus() -->
<div id="chorus-overlay">
  <div class="chorus-zone" id="chorus-zone-label"></div>
  <div id="chorus-text"></div>
  <span class="chorus-dismiss" onclick="dismissChorus()">✕ dismiss</span>
</div>

<div id="controls">
  <span style="color:#6a7890;font-size:11px;">Viewpoints:</span>
  <button onclick="gotoVP('VP_Overview')" id="btn-VP_Overview">Overview</button>
  <button onclick="gotoVP('VP_Origin')" id="btn-VP_Origin">Origin</button>
  <span id="vp-zone-btns"></span>
  <span style="color:#334;font-size:10px;margin-left:8px;">|</span>
  <button onclick="togglePolling()" id="poll-btn">⏸ Pause</button>
  <span id="status"><span id="poll-indicator"></span>Loading…</span>
</div>

<script>
const API = 'http://localhost:5000';
const POLL_MS     = 750;
const HOTHOUSE_MS = 1000;
const LIGHTING_MS = 2000;

const canvas = document.getElementById('x3d');
let pollingActive = true;
let activeVP = null;

// --- Viewpoint navigation ---
function gotoVP(id) {
  try {
    const scene = canvas.browser.currentScene;
    if (!scene) { console.warn('gotoVP: no scene'); return; }
    let vp = scene.getNamedNode(id);
    // If the exact name fails, try scanning for any Viewpoint node
    if (!vp) {
      console.warn('gotoVP: node "' + id + '" not found — available named nodes logged below');
      // Log first 40 named nodes for diagnostics
      try {
        var allNames = scene.namedNodes ? Object.keys(scene.namedNodes).slice(0,40) : [];
        console.log('Named nodes:', allNames.join(', '));
      } catch(e2) {}
      return;
    }
    vp.set_bind = true;
    setStatus('Viewpoint: ' + id);
    if (activeVP) document.getElementById('btn-'+activeVP)?.classList.remove('active');
    document.getElementById('btn-'+id)?.classList.add('active');
    activeVP = id;
  } catch(e) { console.warn('VP nav:', e); }
}

function setStatus(msg) {
  document.getElementById('status').innerHTML = '<span id="poll-indicator"></span>' + msg;
}

function buildVPButtons() {
  // Build viewpoint buttons dynamically from VP_ nodes in the loaded scene
  var span = document.getElementById('vp-zone-btns');
  if (!span) return;
  span.innerHTML = '';
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var allNames = scene.namedNodes ? Object.keys(scene.namedNodes) : [];
    allNames.filter(function(n){ return n.startsWith('VP_') && n !== 'VP_Overview' && n !== 'VP_Origin'; })
      .forEach(function(vpId) {
        var label = vpId.replace('VP_','').replace(/_/g,' ');
        var btn = document.createElement('button');
        btn.id = 'btn-' + vpId;
        btn.textContent = label;
        btn.onclick = function(){ gotoVP(vpId); };
        span.appendChild(btn);
      });
  } catch(e) { console.warn('buildVPButtons:', e); }
}

canvas.addEventListener('load', () => {
  setStatus('Scene loaded');
  buildVPButtons();
  setTimeout(() => gotoVP('VP_Overview'), 400);
  startPolling();
  try {
    const arcChannel = new BroadcastChannel('mccf_arc');
    arcChannel.onmessage = (e) => {
      if (e.data?.type === 'mccf_arc_cv') applyArcCV(e.data.data);
    };
  } catch(e) {}
});

canvas.addEventListener('error', () => setStatus('Load error — check console'));

// --- Polling toggle ---
function togglePolling() {
  pollingActive = !pollingActive;
  document.getElementById('poll-btn').textContent = pollingActive ? '⏸ Pause' : '▶ Resume';
  if (pollingActive) { pollField(); pollHotHouse(); }
}

function flash(ok) {
  const el = document.getElementById('poll-indicator');
  if (el) { el.style.background = ok ? '#4af0a8' : '#df4a4a'; setTimeout(()=>{ if(el) el.style.background='#333'; }, 200); }
}

function startPolling() {
  fetch(API + '/ambient/sync', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({zone_hint:'neutral'})
  }).catch(() => {});
  pollField();
  pollHotHouse();
  pollLighting();
  pollRuntime();
}

// ── ϕ/ϵ runtime display ──────────────────────────────────────────────────────

let _runtimeExpanded = false;

function toggleRuntime() {
  _runtimeExpanded = !_runtimeExpanded;
  document.getElementById('runtime-agents').style.display = _runtimeExpanded ? 'block' : 'none';
  document.getElementById('runtime-toggle').textContent =
    (_runtimeExpanded ? '▼' : '▶') + ' ϕ/ϵ state';
}

async function pollRuntime() {
  if (!pollingActive) { setTimeout(pollRuntime, POLL_MS); return; }
  try {
    const r = await fetch(API + '/field/runtime', {signal: AbortSignal.timeout(2000)});
    const d = await r.json();
    if (_runtimeExpanded) renderRuntime(d.agents || {});
  } catch(e) { /* silent — endpoint may not be reachable */ }
  setTimeout(pollRuntime, POLL_MS);
}

function renderRuntime(agents) {
  const container = document.getElementById('runtime-agents');
  if (!container) return;
  const names = Object.keys(agents);
  if (!names.length) {
    container.innerHTML = '<div style="color:#2a3a4a;font-size:9px;margin-top:3px;">no arc/record data yet</div>';
    return;
  }

  const CHANNELS = ['E','B','P','S'];
  const CH_COLOR = {E:'#f07060', B:'#60a8f0', P:'#f0c060', S:'#60f0a8'};

  let html = '';
  for (const name of names) {
    const rs  = agents[name];
    const phi = rs.constitutional_cv;
    const eps = rs.expressive_cv;
    const del = rs.delta;

    let bars = '';
    for (const ch of CHANNELS) {
      const phiW = Math.round((phi[ch] || 0) * 100);
      const epsW = Math.round((eps[ch] || 0) * 100);
      const d    = del[ch] || 0;
      const dCls = d > 0.005 ? 'rt-drift-pos' : d < -0.005 ? 'rt-drift-neg' : 'rt-drift-zero';
      const dStr = d === 0 ? '·' : (d > 0 ? '+' : '') + d.toFixed(3);
      bars += `
        <div class="rt-row">
          <span class="rt-ch" style="color:${CH_COLOR[ch]}">${ch}</span>
          <div class="rt-bar-wrap">
            <div class="rt-bar-phi" style="width:${phiW}%"></div>
            <div class="rt-bar-eps" style="width:${epsW}%"></div>
          </div>
          <span class="rt-val">${(eps[ch]||0).toFixed(3)}</span>
          <span class="rt-val ${dCls}" style="width:38px">${dStr}</span>
        </div>`;
    }

    const lastTick = rs.last_tick_time > 0
      ? new Date(rs.last_tick_time * 1000).toLocaleTimeString()
      : 'never';

    html += `
      <div class="rt-agent">
        <div class="rt-agent-name">${name}</div>
        <div class="rt-bars">${bars}</div>
        <div class="rt-meta">
          reg ${rs.regulation.toFixed(2)} · drift cap ±${rs.max_drift.toFixed(2)} · tick ${lastTick}
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

// --- /field polling ---
async function pollField() {
  if (!pollingActive) return;
  try {
    const r = await fetch(API+'/field', {signal: AbortSignal.timeout(2000)});
    const d = await r.json();
    flash(true);
    applyFieldData(d);
    document.getElementById('ov-poll').textContent = 'synced '+new Date().toLocaleTimeString();
  } catch(e) {
    flash(false);
    document.getElementById('ov-poll').textContent = 'poll error';
  }
  setTimeout(pollField, POLL_MS);
}

// --- /hothouse/x3d polling ---
async function pollHotHouse() {
  if (!pollingActive) return;
  try {
    const r = await fetch(API+'/hothouse/x3d', {signal: AbortSignal.timeout(2000)});
    const d = await r.json();
    if (d && Object.keys(d).length > 0) {
      applyHotHouseData(d);
    } else {
      applyFieldChannelsToAgents();
    }
  } catch(e) {
    applyFieldChannelsToAgents();
  }
  setTimeout(pollHotHouse, HOTHOUSE_MS);
}

async function pollLighting() {
  if (!pollingActive) return;
  try {
    const r = await fetch(API + '/lighting/scalars', {signal: AbortSignal.timeout(2000)});
    if (r.ok) {
      const scalars = await r.json();
      applyLighting(scalars);
      setTimeout(pollLighting, LIGHTING_MS);
    } else if (r.status === 404) {
      // Endpoint not implemented — stop polling silently
      const lDiag = document.getElementById('light-diag');
      if (lDiag) lDiag.textContent = 'lighting: endpoint not available';
      return;
    } else {
      setTimeout(pollLighting, LIGHTING_MS);
    }
  } catch(e) {
    setTimeout(pollLighting, LIGHTING_MS);
  }
}

function applyFieldChannelsToAgents() {
  const agents = Object.entries((window._lastFieldData || {}).agents || {});
  if (!agents.length) return;
  const mockHotHouse = {};
  agents.forEach(([name, data]) => {
    const w = data.weights || {E:0.35,B:0.25,P:0.20,S:0.20};
    mockHotHouse[name] = {
      morphWeight_emotion: w.E || 0.35,
      animationSpeed:      w.B || 0.25,
      gazeDirectness:      w.P || 0.20,
      socialProximity:     w.S || 0.20,
      gestureConfidence:   0.5,
      interactionOpenness: 1.0
    };
  });
  applyHotHouseData(mockHotHouse);
}

// --- Apply /field to scene ---
function applyFieldData(d) {
  window._lastFieldData = d;
  try {
    const scene   = canvas.browser.currentScene;
    const agents  = Object.keys(d.agents || {});
    const epCount = d.episode_count || 0;
    const ac      = d.alignment_coherence || {};
    const coh     = typeof ac.global_coherence === 'number' ? ac.global_coherence : 0.5;
    const echoArr = Object.values(d.echo_chamber_risks || {});
    const echo    = echoArr.length > 0 ? Math.max(...echoArr) : 0.0;
    const tension = Math.min(1.0, (1.0 - coh)*0.6 + echo*0.4);

    document.getElementById('ov-coh').textContent    = coh.toFixed(3);
    document.getElementById('ov-echo').textContent   = echo.toFixed(3);
    document.getElementById('ov-ep').textContent     = epCount;
    document.getElementById('ov-agents').textContent = agents.length;

    const tel = document.getElementById('ov-tension');
    tel.textContent = tension.toFixed(3);
    tel.className = 'val '+(tension<0.3?'tension-low':tension<0.6?'tension-mid':tension<0.8?'tension-high':'tension-crit');

    try {
      const fn = scene.getNamedNode('GlobalField');
      if (fn) { fn.globalCoherence=coh; fn.echoRisk=echo; fn.tensionLevel=tension; fn.episodeCount=epCount; }
    } catch(e) { /* GlobalField not present in this scene — optional node */ }

    updateFieldMaterials(scene, coh, echo, tension);

    const mx = d.matrix || {};
    updateChannelNode(scene, 'Ch_SA', mx, 'The Steward',   'The Archivist');
    updateChannelNode(scene, 'Ch_SW', mx, 'The Steward',   'The Witness');
    updateChannelNode(scene, 'Ch_AW', mx, 'The Archivist', 'The Witness');
  } catch(e) { console.warn('applyFieldData:', e); }
}

function updateChannelNode(scene, def, matrix, from, to) {
  try {
    if (!matrix) return;
    const coh    = (matrix[from] && matrix[from][to]) ? matrix[from][to] : 0.3;
    const matDef = def.replace('Ch_', 'ChMat_');
    const mat    = scene.getNamedNode(matDef);
    if (mat) mat.transparency = Math.max(0.0, Math.min(0.9, 1.0 - coh));
  } catch(e) {}
}

function updateFieldMaterials(scene, coh, echo, tension) {
  try {
    const ct = scene.getNamedNode('CoherenceReadout');
    if (ct) ct.string = [`coh: ${coh.toFixed(2)}`];
    const tt = scene.getNamedNode('TensionReadout');
    if (tt) tt.string = [`tension: ${tension.toFixed(2)}`];
    const s0 = scene.getNamedNode('S0Light');
    if (s0) s0.intensity = Math.max(0.3, Math.min(1.2, 0.5 + tension * 0.7));
  } catch(e) {}
}

// --- Apply /hothouse/x3d to MCCFAgent nodes ---
function applyHotHouseData(data) {
  if (window._arcCVTimestamp && (Date.now() - window._arcCVTimestamp) < 5000) return;
  if (!data || !Object.keys(data).length) return;

  // Map agent cultivar names to their safeId suffix — matches composer safeId exactly
  // safeId = name.replace(/[^A-Za-z0-9_]/g,'_')
  // Build dynamically from any agents present in the data rather than hardcoding
  const agentMap = {};
  Object.keys(data).forEach(function(name) {
    agentMap[name] = name.replace(/[^A-Za-z0-9_]/g, '_');
  });

  let tracked = 0;
  let applied = 0;

  try {
    const scene = canvas.browser.currentScene;
    if (!scene) return;

    for (const [agentName, suffix] of Object.entries(agentMap)) {
      const d = data[agentName];
      if (!d) continue;
      tracked++;

      const bodyMat = scene.getNamedNode(`BodyMat_${suffix}`);
      if (bodyMat) {
        const eRaw = d.morphWeight_emotion || 0.13;
        const bRaw = d.animationSpeed      || 0.09;
        const pRaw = d.gazeDirectness      || 0.07;
        const e = Math.min(0.85, Math.max(0.25, (eRaw - 0.05) * 1.78 + 0.25));
        const b = Math.min(0.85, Math.max(0.25, (bRaw - 0.05) * 1.78 + 0.25));
        const p = Math.min(0.85, Math.max(0.25, (pRaw - 0.05) * 1.78 + 0.25));
        bodyMat.emissiveColor = new X3D.SFColor(e * 0.70, p * 0.25, b * 0.55);
        applied++;
      }

      const gazeMat = scene.getNamedNode(`GazeMat_${suffix}`);
      if (gazeMat) {
        const gaze     = d.gazeDirectness || 0.07;
        const gazeNorm = Math.min(0.85, Math.max(0.15, (gaze-0.05)*1.78+0.15));
        gazeMat.transparency = new X3D.SFFloat(Math.max(0.2, Math.min(0.7, 1.0 - gazeNorm)));
        applied++;
      }

      const ringMat = scene.getNamedNode(`RingMat_${suffix}`);
      if (ringMat) {
        const open = d.interactionOpenness || 1.0;
        ringMat.transparency = new X3D.SFFloat(Math.max(0.2, Math.min(0.75, 0.8 - open * 0.4)));
        applied++;
      }

      const honorMat = scene.getNamedNode(`HonorMat_${suffix}`);
      if (honorMat) {
        const conf = d.gestureConfidence || 0.8;
        honorMat.emissiveColor = new X3D.SFColor(0.9 * conf, 0.75 * conf, 0.1 * conf);
        applied++;
      }
    }
  } catch(e) {
    // Optional nodes (GazeMat_, BodyMat_, etc.) may not exist in all scenes — skip silently
  }

  const diagEl = document.getElementById('x3d-diag');
  if (diagEl) diagEl.textContent =
    `hothouse: ${tracked}/${Object.keys(agentMap).length} agents | ${applied} nodes updated`;
}

function applyLighting(scalars) {
  if (!scalars) return;
  const lDiag = document.getElementById('light-diag');
  if (lDiag) lDiag.textContent =
    `lighting: baked-in | kelvin=${((scalars.kelvin_normalized||0.5)*3000+3000).toFixed(0)}K (light SAI pending Script Node)`;
}

// ================================================================
// SAI Diagnostic Test
// ================================================================
function runSAITest() {
  const out = document.getElementById('sai-test');
  if (!out) return;
  out.textContent = 'SAI test: running...';
  out.style.color = '#f0c060';

  try {
    const scene = canvas.browser.currentScene;
    if (!scene) { out.textContent = 'SAI test: no scene'; return; }

    // Use first registered avatar node for SAI test — KeyLight may not exist in all scenes
    var testNodeName = (window._avatarNodeNames && window._avatarNodeNames[0]) || 'Avatar_Cindy';
    const key = scene.getNamedNode(testNodeName);
    if (!key) { out.textContent = 'SAI test ERROR: Named node \'' + testNodeName + '\' not found'; return; }

    const startTrans = key.translation;
    const startX = startTrans ? (startTrans.x || 0) : 0;
    const results = [];

    try {
      key.translation = new X3D.SFVec3f(startX, 0, 0);
      var t = key.translation;
      results.push('SFVec3f=>' + (t ? t.x.toFixed(2) : 'null'));
    } catch(e) { results.push('SFVec3f=>err:'+e.message.slice(0,20)); }
    // Restore
    try { if (startTrans) key.translation = startTrans; } catch(e) {}

    const report     = results.join(' | ');
    const anyChanged = results.some(r => r.indexOf('=>err') === -1 && r.indexOf('=>null') === -1);

    if (anyChanged) {
      out.style.color = '#4af0a8';
      out.textContent = '✓ SAI assignment works: ' + report;
      window.SAI_ENABLED = true;
      console.log('MCCF: SAI confirmed working —', report);
    } else {
      out.style.color = '#f06060';
      out.textContent = '✗ No assignment changed value: ' + report;
      console.log('MCCF: SAI still broken —', report);
    }
  } catch(e) {
    out.style.color = '#f06060';
    out.textContent = 'SAI test ERROR: ' + e.message;
  }
}

// --- applyArcCV — confirmed working path for SAI writes ---
// v3.2: adds S-channel → Pos_* translation alongside existing transparency
function applyArcCV(data) {
  if (!data || !data.cv) return;

  try {
    const scene = canvas.browser.currentScene;
    if (!scene) return;

    const cultivar  = data.cultivar || 'The Steward';
    const cv        = data.cv;
    const E         = cv.E || 0.35;
    const B         = cv.B || 0.25;
    const P         = cv.P || 0.25;
    const S         = cv.S || 0.10;
    const coherence = data.coherence || 0.35;

    // v3.4: late-bound suffix — matches composer safeId exactly
    const suffix = cultivar.replace(/[^A-Za-z0-9_]/g, '_');

    // v3.5: if broadcast includes scene-space position, drive avatar directly.
    // This is the Run Scene path — positions come from composer waypoints.
    // GUARD: skip during active X3D TimeSensor playback — the X3D interpolator owns
    // avatar.translation then. Writing it here causes jumps and interpolation fights.
    if (data.pos_x !== undefined && data.pos_z !== undefined) {
      var avatarNodeName = 'Avatar_' + suffix;
      if (!_x3dTimerActive || !_x3dTimerActive[avatarNodeName]) {
        const avatarNode = scene.getNamedNode('Avatar_' + suffix);
        if (avatarNode) {
          const x = parseFloat(data.pos_x) || 0;
          const z = parseFloat(data.pos_z) || 0;
          avatarNode.translation = new X3D.SFVec3f(x, 0, z);
        }
      } else {
        console.log('applyArcCV: position write suppressed — X3D driving', avatarNodeName);
      }
    }

    // Set holdoff so hothouse polling does not overwrite transparency.
    window._arcCVTimestamp = Date.now();

    // Transparency from coherence (unchanged from v3.1)
    const trans = Math.max(0.02, Math.min(0.70, 0.65 - (coherence / 0.5) * 0.60));

    const bodyMat = scene.getNamedNode('BodyMat_' + suffix);
    if (bodyMat) bodyMat.transparency = new X3D.SFFloat(trans);

    const ringMat = scene.getNamedNode('RingMat_' + suffix);
    if (ringMat) ringMat.transparency = new X3D.SFFloat(Math.max(0.1, 0.8 - trans));

    const gazeMat = scene.getNamedNode('GazeMat_' + suffix);
    if (gazeMat) {
      const gazeTransp = Math.max(0.05, Math.min(0.70, 0.5 - P * 0.8));
      gazeMat.transparency = new X3D.SFFloat(gazeTransp);
    }

    // HUD — S-channel and Z position (translation done above)
    const diagEl = document.getElementById('x3d-diag');
    if (diagEl) diagEl.textContent =
      `arc W${data.step}: coh=${coherence.toFixed(3)} opacity=${(1-trans).toFixed(2)} E=${E.toFixed(2)} S=${S.toFixed(2)} [${suffix}]`;

  } catch(e) {
    console.warn('applyArcCV error:', e.message);
  }
}

async function pbLoadFiles() {
  try {
    const r = await fetch(API + '/arc/playback');
    const data = await r.json();
    const sel = document.getElementById('pb-file');
    if (!sel) return;
    // Clear all options except the placeholder, then rebuild
    while (sel.options.length > 1) sel.remove(1);
    (data.files || []).forEach(function(f) {
      const opt = document.createElement('option');
      opt.value = f.filename;
      opt.dataset.sceneName = f.scene_name || '';
      // Prefer server-supplied path_name over cultivar name
      var label;
      if (f.path_name && f.path_name !== f.cultivar) {
        label = f.path_name.replace(/_/g,' ');
      } else if (f.label) {
        label = f.label;
      } else {
        // Parse from filename: arc_{anything}_{timestamp}.xml
        var base = (f.filename||'').replace(/^arc_/,'').replace(/\.xml$/,'');
        var tsMatch = base.match(/^(.*?)_([0-9]{8,}|[0-9]{4}-[0-9]{2}-[0-9]{2}.*)$/);
        label = tsMatch ? tsMatch[1].replace(/_/g,' ') : base.replace(/_/g,' ');
      }
      // Append cultivar in brackets if it differs from path label
      var cultivarSuffix = (f.cultivar && f.cultivar.replace(/_/g,' ').toLowerCase() !== label.toLowerCase())
        ? ' ['+f.cultivar+']' : '';
      opt.textContent = label + cultivarSuffix
        + (f.steps_seen ? ' ('+f.steps_seen+'wp)' : '');
      sel.appendChild(opt);
    });
    // Auto-select the newest arc (first in list, server returns newest-first)
    if (sel.options.length > 1) {
      sel.selectedIndex = 1;
      pbFileChanged();
    }
    cacheSceneContext(data.files || []);
    // Cache first waypoint of first arc for reset fallback
    if (data.files && data.files[0] && data.files[0].first_waypoint) {
      window._pbFirstWaypoint = data.files[0].first_waypoint;
    }
  } catch(e) {
    var el = document.getElementById('pb-step-info');
    if (el) el.textContent = 'Could not load files.';
  }
}

    .then(function(txt){

function pbSpeak(text) {

// Speak all qa_lines in sequence, assigning voice by speaker name
// Voice lookup priority: (1) scene XML voice= attribute, (2) rotation fallback
var _pbSpeakerVoiceMap = {};  // speaker name -> SpeechSynthesisVoice object (resolved once)

function _xe(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function _buildSceneVoiceMapFromCultivars() {
  // Preferred path: read voice directly from /cultivars/xml (Character Creator is authoritative)
  var map = {};
  if (!_pbVoices.length) return map;
  try {
    var r = await fetch(API + '/cultivars/xml');
    if (!r.ok) return map;
    var data = await r.json();
    (data.cultivars || []).forEach(function(c) {
      var name = c.agentname;
      var voiceName = c.voice_name;
      if (!name || !voiceName) return;
      function baseVoiceName(s) {
        return s.replace(/\s*-\s*[A-Z].*$/, '').replace(/\s+Desktop\b.*$/, '').replace(/\s*\(.*\)\s*$/, '').trim().toLowerCase();
      }
      var voiceBase = baseVoiceName(voiceName);
      var v = _pbVoices.find(function(v){ return v.name === voiceName; })
           || _pbVoices.find(function(v){ return v.name.indexOf(voiceName) === 0; })
           || _pbVoices.find(function(v){ return voiceName.indexOf(v.name) === 0; })
           || _pbVoices.find(function(v){ return baseVoiceName(v.name) === voiceBase; });
      if (v) map[name] = v;
    });
  } catch(e) { console.warn('_buildSceneVoiceMapFromCultivars error:', e); }
  return map;
}

function _buildSceneVoiceMap() {
  // Fallback path: parse <EmotionalArc cultivar="X" voice="Y"> from loaded scene XML
  // Used when /cultivars/xml is unavailable or returns no voice data.
  var map = {};
  var src = window._loadedSceneDefXml || window._loadedSceneXml;
  if (!src || !_pbVoices.length) return map;
  try {
    var doc = new DOMParser().parseFromString(src, 'text/xml');
    doc.querySelectorAll('EmotionalArc').forEach(function(el) {
      var name = el.getAttribute('cultivar');
      var voiceName = el.getAttribute('voice');
      if (!name || !voiceName) return;
      function baseVoiceName(s) {
        return s.replace(/\s*-\s*[A-Z].*$/, '').replace(/\s+Desktop\b.*$/, '').replace(/\s*\(.*\)\s*$/, '').trim().toLowerCase();
      }
      var voiceBase = baseVoiceName(voiceName);
      var v = _pbVoices.find(function(v){ return v.name === voiceName; })
           || _pbVoices.find(function(v){ return v.name.indexOf(voiceName) === 0; })
           || _pbVoices.find(function(v){ return voiceName.indexOf(v.name) === 0; })
           || _pbVoices.find(function(v){ return baseVoiceName(v.name) === voiceBase; });
      if (v) map[name] = v;
    });
  } catch(e) { console.warn('_buildSceneVoiceMap error:', e); }
  return map;
}

var _pbSceneVoiceMap = null;  // built once per scene load

// Pending onComplete callback for in-progress TTS — keyed by TTS content key.
// When pbSpeakQALines is called with the same lines (duplicate key), the new onComplete
// replaces the old one so the correct callback fires when speech finishes.
var _pbPendingOnComplete = {};

// Cancellation token — incremented each time speechSynthesis.cancel() is called.
// Each speak session captures the token at start; if it differs on onend, the
// utterance was cancelled and onComplete must NOT fire.
var _pbSpeakToken = 0;

function pbSpeakQALines(qaLines, onComplete) {
  // onComplete — optional callback fired when all TTS lines finish (not cancelled).
  var voiceEl = document.getElementById('pb-voice');
  if (!voiceEl || !voiceEl.checked) {
    if (onComplete) onComplete();
    return;
  }
  if (!window.speechSynthesis || !qaLines || !qaLines.length) {
    if (onComplete) onComplete();
    return;
  }
  var key = qaLines.map(function(l){return l.text;}).join('|');
  if (key === _pbLastSpoken) {
    // Same lines already queued or speaking — replace pending onComplete, don't restart.
    if (onComplete) {
      _pbPendingOnComplete[key] = onComplete;
      console.log('pbSpeakQALines: duplicate — replaced pending onComplete for key', key.slice(0,40));
    }
    return;
  }
  _pbLastSpoken = key;
  if (onComplete) _pbPendingOnComplete[key] = onComplete;

  // Increment token to invalidate any stale onend callbacks from a previous session
  // that may still be in flight. Do NOT call speechSynthesis.cancel() — cancel fires
  // onend synchronously on the current utterance, which with the new token would
  // immediately trigger onComplete for this session before any speech has occurred.
  _pbSpeakToken++;
  var myToken = _pbSpeakToken;

  function _ensureVoiceMapThenSpeak(retriesLeft) {
    if (!_pbVoices.length) {
      if (window.speechSynthesis) {
        var v = speechSynthesis.getVoices().filter(function(v){ return v.lang.startsWith('en'); });
        if (v.length) _pbVoices = v;
      }
    }
    if ((!_pbSceneVoiceMap || Object.keys(_pbSceneVoiceMap).length === 0) && _pbVoices.length) {
      // Try cultivar API first (Character Creator is authoritative); fall back to arc XML
      _buildSceneVoiceMapFromCultivars().then(function(map) {
        if (Object.keys(map).length > 0) {
          _pbSceneVoiceMap = map;
        } else {
          _pbSceneVoiceMap = _buildSceneVoiceMap();
        }
        _continueAfterVoiceMap(retriesLeft);
      }).catch(function() {
        _pbSceneVoiceMap = _buildSceneVoiceMap();
        _continueAfterVoiceMap(retriesLeft);
      });
      return;
    }
    _continueAfterVoiceMap(retriesLeft);
  }

  function _continueAfterVoiceMap(retriesLeft) {
    if (!_pbVoices.length && retriesLeft > 0) {
      setTimeout(function(){ _ensureVoiceMapThenSpeak(retriesLeft - 1); }, 300);
      return;
    }
    // Wait for any in-progress speech from a previous session to finish naturally.
    // Do not cancel — cancel fires onend synchronously which would trigger onComplete
    // for this session before any speech has occurred.
    if (window.speechSynthesis.speaking) {
      setTimeout(function(){
        if (_pbSpeakToken !== myToken) return; // superseded by a newer session
        _continueAfterVoiceMap(0);
      }, 100);
      return;
    }
    _doSpeak();
  }

  function _doSpeak() {
    var queue = qaLines.filter(function(l){return l.text && l.text.trim();});
    var capturedKey = key;
    var capturedToken = myToken;
    var rotationCount = 0;
    function speakNext(i) {
      // If token has changed, this session was cancelled — do not fire onComplete.
      if (_pbSpeakToken !== capturedToken) {
        console.log('pbSpeakQALines: session cancelled (token mismatch) — suppressing onComplete for', capturedKey.slice(0,40));
        return;
      }
      if (i >= queue.length) {
        var cb = _pbPendingOnComplete[capturedKey];
        delete _pbPendingOnComplete[capturedKey];
        if (cb) cb();
        return;
      }
      var line = queue[i];
      var utt = new SpeechSynthesisUtterance(line.text);
      utt.rate = 0.95;
      var speaker = line.speaker || (line.type === 'Question' ? '__Q__' : '__R__');
      var sceneVoice = _pbSceneVoiceMap && _pbSceneVoiceMap[speaker];
      if (sceneVoice) {
        utt.voice = sceneVoice;
      } else {
        if (_pbSpeakerVoiceMap[speaker] === undefined) {
          _pbSpeakerVoiceMap[speaker] = rotationCount % Math.max(1, _pbVoices.length);
          rotationCount++;
        }
        if (_pbVoices[_pbSpeakerVoiceMap[speaker]]) utt.voice = _pbVoices[_pbSpeakerVoiceMap[speaker]];
      }
      utt.onend = function() { speakNext(i+1); };
      utt.onerror = function() { speakNext(i+1); };
      speechSynthesis.speak(utt);
    }
    speakNext(0);
  }

  _ensureVoiceMapThenSpeak(3);
}

// Track last arrived segment per agent — set by segmentArrived callback
var _x3dLastArrivedSeg = {};

// Guard: set true when the final waypoint TTS has been handed off, preventing
// a second pbReleaseDwell call (from the onComplete chain) from re-entering.
var _pbArcComplete = false;

function pbReleaseDwell(agentSafeName) {
  // Called after TTS completes for an X3D-driven agent.
  // Starts Dwell_{agentSafeName}_{seg} directly via SAI using canvas.browser.currentTime.
  // Does NOT rely on Arrival_ Script releaseDwell input — Browser.currentTime inside an
  // externally-triggered Script input field is unreliable in X_ITE (may return 0 or stale value),
  // causing the TimeSensor to not fire correctly and breaking the ROUTE chain.

  // Guard: if arc is already complete, this is a spurious re-entry from the final
  // waypoint TTS onComplete callback — ignore it.
  if (_pbArcComplete) {
    console.log('pbReleaseDwell: arc already complete — ignoring spurious call for', agentSafeName);
    return;
  }

  if (!canvas || !canvas.browser) return;
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var seg = _x3dLastArrivedSeg[agentSafeName] || 0;

    // seg=0 means WP1 TTS just completed — no segment has arrived yet.
    // Wait dwell interval then fire startAgent to begin Timer_1 (first movement).
    // Use Dwell_1's cycleInterval as the wait duration but don't start the X3D Dwell node —
    // Dwell_1 is reserved for after WP2 arrival (seg=1).
    if (seg === 0) {
      var dwell0Name = 'Dwell_' + agentSafeName + '_1';
      var dwell0Node = null;
      try { dwell0Node = scene.getNamedNode(dwell0Name); } catch(e) {}
      var dwell0Interval = dwell0Node ? (dwell0Node.cycleInterval || 2.0) : 2.0;
      var _agentForStart = agentSafeName;
      console.log('pbReleaseDwell: WP1 complete — waiting', dwell0Interval, 's then starting Timer_1 for', agentSafeName);
      setTimeout(function() {
        try {
          var mn = canvas.browser.currentScene.getNamedNode('MCCFMaster');
          if (mn) {
            mn.startAgent = _agentForStart;
            console.log('pbReleaseDwell: WP1 dwell expired — sent startAgent for', _agentForStart);
          }
        } catch(e) { console.warn('pbReleaseDwell startAgent error:', e); }
      }, Math.round(dwell0Interval * 1000));
      return;
    }
    var dwellNodeName = 'Dwell_' + agentSafeName + '_' + seg;
    var dwellNode = scene.getNamedNode(dwellNodeName);
    if (!dwellNode) {
      console.warn('pbReleaseDwell: ' + dwellNodeName + ' not found');
      return;
    }
    // Start Dwell for linger, then after dwell interval start next Timer via MCCFMaster
    var masterNodeR = scene.getNamedNode('MCCFMaster');
    if (masterNodeR) {
      masterNodeR.releaseDwellAgent = agentSafeName + ':' + seg;
      console.log('pbReleaseDwell: started Dwell ' + agentSafeName + ':' + seg);
      // After dwell interval, start next timer
      var dwellInterval = dwellNode ? (dwellNode.cycleInterval || 2.0) : 2.0;
      var _agentForTimer = agentSafeName;
      var _segForTimer = seg;
      setTimeout(function() {
        try {
          var scene2 = canvas.browser.currentScene;
          var nextTimerName = 'Timer_' + _agentForTimer + '_' + (_segForTimer + 1);
          var nextTimer = null;
          try { nextTimer = scene2 && scene2.getNamedNode(nextTimerName); } catch(e) {}
          if (nextTimer) {
            var mn = scene2 && scene2.getNamedNode('MCCFMaster');
            if (mn) {
              mn.startNextTimer = _agentForTimer + ':' + _segForTimer;
              console.log('pbReleaseDwell: fired startNextTimer for', _agentForTimer, 'after seg', _segForTimer);
            }
          } else {
            // No next timer — last segment dwell expired.
            // Fetch and display the final waypoint (N waypoints, N-1 segments means the
            // last waypoint is never reached by segmentArrived). Use pbStep() to advance
            // the server to the final waypoint, then display it with a special flag that
            // prevents pbReleaseDwell from being called after its TTS completes.
            console.log('pbReleaseDwell: fetching final waypoint for', _agentForTimer);
            _pbArcComplete = true;  // set now so any re-entrant pbReleaseDwell calls are blocked
            fetch(API + '/arc/playback/step', {method:'POST'})
              .then(function(r){ return r.json(); })
              .then(function(d){ pbUpdateDisplayFinal(d); })
              .catch(function(e){ console.warn('final waypoint fetch failed:', e); });
          }
        } catch(e) { console.warn('startNextTimer error:', e); }
      }, Math.round(dwellInterval * 1000));
    } else {
      console.warn('pbReleaseDwell: MCCFMaster not found — cannot start', dwellNodeName);
    }
  } catch(e) {
    console.warn('pbReleaseDwell error:', e);
  }
}

// Track which avatar safenames are being driven by X3D TimeSensor (not JS lerp)
var _x3dTimerActive = {};

function _x3dNow() {
  // Returns X_ITE internal scene time, or null if unavailable.
  // Diagnostic: log what's on canvas.browser so we know what SAI exposes.
  try {
    var t = canvas && canvas.browser && canvas.browser.currentTime;
    if (t !== undefined && t !== null) return t;
    if (canvas && canvas.browser && typeof canvas.browser.getWorldTime === 'function') {
      var wt = canvas.browser.getWorldTime();
      if (wt !== undefined && wt !== null) return wt;
    }
    // Fallback: read .time from any active TimeSensor in the scene
    if (canvas && canvas.browser && canvas.browser.currentScene) {
      var scene = canvas.browser.currentScene;
      var activeKeys = Object.keys(_x3dTimerActive);
      for (var i = 0; i < activeKeys.length; i++) {
        var suffix = activeKeys[i].replace(/^Avatar_/, '');
        try {
          var tn = scene.getNamedNode('Timer_' + suffix + '_1');
          if (tn && tn.time !== undefined && tn.time > 0) return tn.time;
        } catch(e2) {}
      }
    }
    // Log what browser exposes so we can find the right property
    if (canvas && canvas.browser) {
      var keys = [];
      for (var k in canvas.browser) { if (k.toLowerCase().includes('time')) keys.push(k); }
      console.log('_x3dNow: browser time-related properties:', keys.join(', ') || '(none)');
    }
  } catch(e) {}
  return null;
}

function pbActivateX3DTimers(cultivars) {
  // Start Timer_{safeName}_1 for each agent and wire Arrival_.segmentArrived -> pbStep.
  // Uses cultivar names from arc playback state — does NOT enumerate scene.namedNodes
  // because X_ITE SAI does not expose Script DEF nodes via namedNodes enumeration.
  // getNamedNode('Arrival_Cindy') works; Object.keys(scene.namedNodes) misses Script nodes.
  console.log('pbActivateX3DTimers: entered, cultivars =', cultivars);
  if (!canvas || !canvas.browser) { console.warn('pbActivateX3DTimers: no browser'); return; }
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) { console.warn('pbActivateX3DTimers: no currentScene'); return; }
    _x3dTimerActive = {};
    // Kill any polls from a previous play before wiring new ones
    if (window._pbPollingSegment) {
      Object.keys(window._pbPollingSegment).forEach(function(k) {
        window._pbPollingSegment[k] = false;
      });
    }
    window._pbPollingSegment = {};

    if (!cultivars || cultivars.length === 0) {
      console.warn('pbActivateX3DTimers: no cultivars passed — cannot wire Arrival_ or start Timers');
      return;
    }

    cultivars.forEach(function(cultivarName) {
      var safeName = cultivarName.replace(/[^A-Za-z0-9_]/g, '_');
      var arrNodeName = 'Arrival_' + safeName;
      var timerNodeName = 'Timer_' + safeName + '_1';
      var avatarName = 'Avatar_' + safeName;

      // Wire Arrival_ segmentArrived -> pbStep
      // addFieldCallback on outputOnly Script fields not reliably supported — always poll.
      try {
        var arrNode = scene.getNamedNode(arrNodeName);
        if (!arrNode) {
          console.warn('pbActivateX3DTimers: ' + arrNodeName + ' not found in scene');
        } else {
          // Attempt addFieldCallback first. If it succeeds, skip poll to avoid double-firing.
          // Both callback AND poll firing = pbStep called twice = premature dwell release = skipped waypoint.
          var cbWired = false;
          try {
            var field = arrNode.getField('segmentArrived');
            if (field && typeof field.addFieldCallback === 'function') {
              var _lastCbSeg = -1;
              field.addFieldCallback(arrNodeName + '_cb', function(value) {
                var seg = parseInt(value) || 0;
                if (seg <= _lastCbSeg) {
                  console.log('segmentArrived callback DUPLICATE suppressed: ' + arrNodeName + ' seg=' + seg);
                  return;
                }
                _lastCbSeg = seg;
                console.log('segmentArrived callback: ' + arrNodeName + ' seg=' + seg);
                _x3dLastArrivedSeg[safeName] = seg;
                // All segments call pbStep() — server advances to next waypoint.
                // WP1 is displayed at play start (pbPlay calls pbUpdateDisplay immediately).
                // seg=1 arrival means avatar has completed segment 1 and is now at WP2.
                pbStep();
              });
              cbWired = true;
              console.log('pbActivateX3DTimers: wired segmentArrived callback on', arrNodeName, '— skipping poll');
            }
          } catch(cbErr) {}
          if (!cbWired) {
            console.log('pbActivateX3DTimers: addFieldCallback unavailable for', arrNodeName, '— using poll');
          }
          // Only install poll if callback not wired
          window._pbPollingSegment[arrNodeName] = !cbWired;
          if (!cbWired) (function(node, name) {
            var lastSeg = -1;
            var _pollWasActive = window._pbPollingSegment[name];
            var pollId = setInterval(function() {
              if (!window._pbPollingSegment || !window._pbPollingSegment[name]) {
                clearInterval(pollId);
                if (_pollWasActive) console.log('pbActivateX3DTimers: poll stopped for', name);
                return;
              }
              try {
                var v = node.segmentArrived;
                if (v === undefined || v === null) {
                  var f = node.getField ? node.getField('segmentArrived') : null;
                  v = f ? f.getValue() : 0;
                }
                v = parseInt(v) || 0;
                if (v > lastSeg) {
                  lastSeg = v;
                  console.log('segmentArrived poll: ' + name + ' seg=' + v);
                  pbStep();
                }
              } catch(e) {}
            }, 200);
          })(arrNode, arrNodeName);
        }
      } catch(e) { console.warn('pbActivateX3DTimers: could not wire', arrNodeName, e); }

      // Start Timer_{agent}_1
      try {
        var timerNode = scene.getNamedNode(timerNodeName);
        if (!timerNode) {
          console.warn('pbActivateX3DTimers: ' + timerNodeName + ' not found in scene');
        } else {
          // Mark avatar as X3D-driven so pbPushPosition and applyArcCV skip it.
          // Timer_1 is started by pbReleaseDwell after WP1 TTS+dwell completes,
          // via startAgent — same path as all subsequent timers use startNextTimer.
          _x3dTimerActive[avatarName] = true;
          console.log('pbActivateX3DTimers: armed X3D driving for', avatarName, '— Timer_1 starts after WP1 dwell');
        }
      } catch(e) { console.warn('pbActivateX3DTimers: could not start', timerNodeName, e); }
    });
  } catch(e) { console.warn('pbActivateX3DTimers error:', e); }
}

function pbStopX3DTimers() {
  // Disable timers by deriving names from _x3dTimerActive keys (Avatar_X -> Timer_X_1, Timer_X_2, etc.)
  // Does NOT use scene.namedNodes enumeration — Script nodes not reliably enumerated by X_ITE SAI.
  if (canvas && canvas.browser) {
    try {
      var scene = canvas.browser.currentScene;
      if (scene) {
        Object.keys(_x3dTimerActive).forEach(function(avatarName) {
          var suffix = avatarName.replace(/^Avatar_/, '');
          // Disable up to 8 segments worth of timers and dwells
          for (var i = 1; i <= 8; i++) {
            ['Timer_'+suffix+'_'+i, 'Dwell_'+suffix+'_'+i].forEach(function(nodeName) {
              try {
                var n = scene.getNamedNode(nodeName);
                if (n) n.enabled = false;
              } catch(e) {}
            });
          }
        });
      }
    } catch(e) {}
  }
  _x3dTimerActive = {};
  // Stop all segmentArrived polls
  if (window._pbPollingSegment) {
    Object.keys(window._pbPollingSegment).forEach(function(k) {
      window._pbPollingSegment[k] = false;
    });
  }
}
var _lerpActive = {};      // suffix → { timer, stepNum }
var _lerpDest   = {};      // suffix → { x, z } — intended destination, set once per step change

function pbPushPosition(wp) {
  if (!wp) return;
  var x = parseFloat(wp.pos_x)||0, y = parseFloat(wp.pos_y)||0, z = parseFloat(wp.pos_z)||0;
  if (!wp.cultivar) { console.warn('pbPushPosition: no cultivar in wp', wp); return; }
  // If X3D TimeSensor is driving this avatar, skip JS lerp entirely
  var safeName = wp.cultivar.replace(/[^A-Za-z0-9_]/g,'_');
  var nodeName = 'Avatar_' + safeName;
  if (_x3dTimerActive[nodeName]) return;
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var safeName = wp.cultivar.replace(/[^A-Za-z0-9_]/g,'_');
    var nodeName = 'Avatar_' + safeName;
    var avatarNode = scene.getNamedNode(nodeName);
    if (!avatarNode) {
      console.warn('pbPushPosition: node not found:', nodeName, '— cultivar was:', wp.cultivar);
      return;
    }

    // If already lerping toward this exact destination, do not restart — let it finish.
    var dest = _lerpDest[safeName];
    if (dest && Math.abs(dest.x - x) < 0.01 && Math.abs(dest.z - z) < 0.01) return;

    // New destination — cancel any in-progress lerp and start fresh.
    if (_lerpActive[safeName]) {
      clearInterval(_lerpActive[safeName].timer);
      delete _lerpActive[safeName];
    }
    _lerpDest[safeName] = { x: x, z: z };

    // Read start position from stored destination of previous lerp (not from SAI read-back,
    // which may lag). Fall back to SAI read only when no prior destination is known.
    var startX, startZ;
    if (dest) {
      startX = dest.x;
      startZ = dest.z;
    } else {
      var cur = avatarNode.translation;
      startX = cur ? (cur.x || 0) : 0;
      startZ = cur ? (cur.z || 0) : 0;
    }

    var pace = parseFloat((document.getElementById('pb-pace')||{}).value) || 3.0;
    var LERP_FPS = 30;
    var totalSteps = Math.max(1, Math.round(pace * LERP_FPS));
    var stepMs     = Math.round(1000 / LERP_FPS);

    console.log('pbPushPosition:', nodeName, 'from', startX, startZ, '→', x, z);

    var state = { stepNum: 0 };
    state.timer = setInterval(function() {
      state.stepNum++;
      var t = state.stepNum / totalSteps;
      t = t * t * (3 - 2 * t);  // smoothstep
      var lx = startX + (x - startX) * t;
      var lz = startZ + (z - startZ) * t;
      try {
        avatarNode.translation = new X3D.SFVec3f(lx, y, lz);
      } catch(e) {}
      if (state.stepNum >= totalSteps) {
        clearInterval(state.timer);
        delete _lerpActive[safeName];
        try { avatarNode.translation = new X3D.SFVec3f(x, y, z); } catch(e) {}
      }
    }, stepMs);

    _lerpActive[safeName] = state;

  } catch(e) { console.warn('pbPushPosition error:', e); }
}

async function pbPlay() {
  const file = document.getElementById('pb-file');
  if (!file || !file.value) { alert('Select an arc file first.'); return; }
  // Kill any stale polls from previous play before starting
  if (window._pbPollingSegment) {
    Object.keys(window._pbPollingSegment).forEach(function(k){ window._pbPollingSegment[k] = false; });
  }
  window._pbPollingSegment = {};
  _pbStepInFlight = false;
  _pbArcComplete = false;
  _pbPendingOnComplete = {};
  _pbSpeakToken = 0;
  _pbLastSpoken = '';
  _pbLastStepKey = '';
  _x3dLastArrivedSeg = {};   // reset segment tracking — prevents stale seg from previous run
  _chorusLastTimestamp = 0;  // reset so poll always picks up the next response
  stopChorusPoll();
  dismissChorus();
  fetch(API + '/chorus/clear', {method: 'POST'}).catch(function(){});
  const pace = parseFloat(document.getElementById('pb-pace').value) || 3.0;
  const loop = document.getElementById('pb-loop').checked;
  try {
    const r = await fetch(API+'/arc/playback/start', {
      method:'POST', headers:{'Content-Type':'application/json'},
      // auto:false — X3D segmentArrived callback drives step advancement; server auto-timer would race
      body: JSON.stringify({file:file.value, pace:pace, loop:loop, auto:false})
    });
    const data = await r.json();
    if (data.error) { document.getElementById('pb-step-info').textContent='Error: '+data.error; return; }
    var cultivars = (data.state||data).cultivars || [];
    if (cultivars.length > 0) {
      // X3D-driven mode: display WP1 immediately — avatar starts at WP1 position,
      // so WP1 speech should fire before any movement begins. All segmentArrived
      // callbacks call pbStep() to advance to the next waypoint.
      pbStopPolling();
      var stateData = data.state||data;
      var el = document.getElementById('pb-step-info');
      if (el) el.textContent = 'Playing — ' + (stateData.total_steps||'?') + ' waypoints';
      console.log('pbPlay: X3D-driven mode — polling suppressed, segmentArrived drives steps');
      // Display WP1 now — avatar is already there. TTS onComplete → pbReleaseDwell → dwell → Timer_1.
      pbActivateX3DTimers(cultivars);
      pbUpdateDisplay(stateData);
    } else {
      // JS-lerp mode: poll drives display
      pbUpdateDisplay(data.state||data);
      pbStartPolling(pace);
      pbActivateX3DTimers(cultivars);
    }
    // pbActivateX3DTimers already called above for X3D mode
  } catch(e) { document.getElementById('pb-step-info').textContent='Play failed: '+e.message; }
}

var _pbStepInFlight = false;
async function pbStep() {
  if (_pbStepInFlight) { console.log('pbStep: SKIPPED — already in flight (double-fire guard)'); return; }
  _pbStepInFlight = true;
  try { const r=await fetch(API+'/arc/playback/step',{method:'POST'}); pbUpdateDisplay(await r.json()); } catch(e) {}
  finally { _pbStepInFlight = false; }
}
async function pbStop() {
  pbStopPolling();
  pbStopX3DTimers();
  try { const r=await fetch(API+'/arc/playback/stop',{method:'POST'}); pbUpdateDisplay(await r.json()); } catch(e) {}
}
async function pbReset() {
  pbStopPolling();
  stopChorusPoll();
  dismissChorus();
  _pbResetViaKillScript();
  _lerpDest = {};
  _x3dTimerActive = {};
  _pbLastStepKey = '';
  _pbLastSpoken = '';
  _pbArcComplete = false;
  _pbPendingOnComplete = {};
  _pbSpeakToken = 0;
  try {
    const r=await fetch(API+'/arc/playback/reset',{method:'POST'});
    pbUpdateDisplay(await r.json());
    var qr=document.getElementById('pb-qr'); if(qr) qr.style.display='none';
  } catch(e) {}
}

function _pbResetViaKillScript() {
  if (!canvas || !canvas.browser) { resetToStartPosition(); return; }
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) { resetToStartPosition(); return; }
    // Derive Kill_ node names from _x3dTimerActive (Avatar_X -> Kill_X)
    // Does NOT use scene.namedNodes — Script nodes not reliably enumerated by X_ITE SAI.
    var agentSuffixes = Object.keys(_x3dTimerActive).map(function(n){ return n.replace(/^Avatar_/,''); });
    // Also check polling segment names as fallback
    if (agentSuffixes.length === 0 && window._pbPollingSegment) {
      Object.keys(window._pbPollingSegment).forEach(function(n){
        var m = n.match(/^Arrival_(.+)$/);
        if (m) agentSuffixes.push(m[1]);
      });
    }
    var found = false;
    agentSuffixes.forEach(function(suffix) {
      var nodeName = 'Kill_' + suffix;
      try {
        var killNode = scene.getNamedNode(nodeName);
        if (!killNode) return;
        killNode.resetPos = true;
        found = true;
        console.log('pbReset: fired resetPos on', nodeName);
      } catch(e) { console.warn('pbReset: Kill_ resetPos failed on', nodeName, e); }
    });
    if (!found) {
      console.warn('pbReset: no Kill_ scripts found — falling back to JS resetToStartPosition');
      resetToStartPosition();
    }
  } catch(e) { console.warn('_pbResetViaKillScript error:', e); resetToStartPosition(); }
}

function pbStartPolling(pace) {
  pbStopPolling();
  pbPolling=true;
  // Poll at 1/3 of pace so we never miss a step on display
  var interval=Math.max(400, Math.round((pace/3)*1000));
  pbPollTimer=setInterval(pbPollState,interval);
}
function pbStopPolling() {
  pbPolling=false;
  if(pbPollTimer){clearInterval(pbPollTimer);pbPollTimer=null;}
}
async function pbPollState() {
  try {
    const r=await fetch(API+'/arc/playback/state');
    const data=await r.json();
    pbUpdateDisplay(data);
    if(data.status==='complete'||data.status==='idle') pbStopPolling();
  } catch(e) {}
}

function pbUpdateDisplay(state) {
  if (!state||state.status==='idle') {
    var el=document.getElementById('pb-step-info'); if(el) el.textContent='Idle.';
    var qr=document.getElementById('pb-qr'); if(qr) qr.style.display='none';
    return;
  }
  var wp=state.current_waypoint||{};
  // Inject cultivar into wp if server didn't include it (arc XML waypoints carry no cultivar attr)
  if (!wp.cultivar && state.cultivars && state.cultivars.length) {
    wp.cultivar = state.cultivars[0];
  }
  var step=wp.stepno||state.step||0;
  var total=state.total_steps||'?';
  var cultivar=wp.cultivar||(state.cultivars||[]).join(', ')||'';
  var status=state.status||'';
  var sym=status==='playing'?'⏵':status==='paused'?'⏸':status==='complete'?'⏹':'○';
  var si=document.getElementById('pb-step-info');
  if(si) si.innerHTML=sym+' <b>'+cultivar+'</b> &nbsp; step '+step+' / '+total
    +(wp.id?' &nbsp;<span style="color:#4a6070">'+wp.id+'</span>':'')
    +(wp.pos_x!==undefined?' &nbsp;<span style="color:#4a6070;font-size:10px">X='+parseFloat(wp.pos_x).toFixed(1)+' Z='+parseFloat(wp.pos_z||0).toFixed(1)+'</span>':'');
  var ch=document.getElementById('pb-channels');
  if(ch&&wp.E!==undefined) ch.innerHTML=
    '<span class="pc-E">E '+(wp.E||0).toFixed(2)+'</span>'+
    '<span class="pc-B">B '+(wp.B||0).toFixed(2)+'</span>'+
    '<span class="pc-P">P '+(wp.P||0).toFixed(2)+'</span>'+
    '<span class="pc-S">S '+(wp.S||0).toFixed(2)+'</span>';
  var qr=document.getElementById('pb-qr');
  var qaLines=wp.qaLines||wp.qa_lines||[];  // server serializes as qaLines; qa_lines fallback for legacy arcs
  if(qaLines.length||wp.question||wp.response){
    if(qr) qr.style.display='block';
    var qEl=document.getElementById('pb-question');
    var rEl=document.getElementById('pb-response');
    if(qaLines.length){
      // Display all lines in sequence order — prefix Q/R/— with speaker in brackets
      var allText=qaLines.filter(function(l){return l.text&&l.text.trim();})
        .map(function(l){
          var p=l.type==='Question'?'Q':l.type==='Response'?'R':'—';
          return p+(l.speaker?' ['+l.speaker+']':'')+': '+l.text;
        }).join('\n');
      if(qEl) qEl.textContent=allText;
      if(rEl) rEl.textContent='';
      // TTS fired after lerp delay below
    } else {
      if(qEl) qEl.textContent=wp.question?'Q: '+wp.question:'';
      if(rEl) rEl.textContent=wp.response?wp.response:'';
      // TTS fired after lerp delay below
    }
  } else { if(qr) qr.style.display='none'; }
  var pace2 = parseFloat((document.getElementById('pb-pace')||{}).value) || 3.0;
  // Build a key that identifies this step uniquely — used to prevent re-firing TTS on repeated polls
  // Step key: use stepno (server step counter) as single stable integer.
  // pos_x/pos_z and wp.id may differ between pbStep() and pbPollState() responses — don't use them.
  var stepKey = String(wp.stepno || state.step || wp.id || '');
  var isNewStep = (stepKey !== _pbLastStepKey);
  if (isNewStep) _pbLastStepKey = stepKey;
  // TTS fires on new step regardless of whether position is X3D-driven or JS-lerped.
  // Decoupled from _x3dTimerActive — dialogue is MCCF domain, not X3D domain.
  if (isNewStep && (qaLines.length || wp.question || wp.response)) {
    clearTimeout(window._pbSpeakTimer);
    var safeName2 = (wp.cultivar||'').replace(/[^A-Za-z0-9_]/g,'_');
    var isX3DDriven = !!_x3dTimerActive['Avatar_' + safeName2];
    // X3D-driven: cycleTime fires in the same event cascade as the final fraction_changed=1.0.
    // X_ITE may deliver cycleTime to the Script before rendering the interpolator's last frame,
    // so the avatar appears to still be moving when TTS starts. A short settle delay lets the
    // renderer catch up before speech begins. 150ms = ~9 frames at 60fps — enough without
    // being perceptible as a pause.
    // JS-lerp: delay by pace so avatar arrives before speaking. No releaseDwell needed.
    var ttsDelay = isX3DDriven ? 1000 : Math.round(pace2 * 1000);
    window._pbSpeakTimer = setTimeout(function() {
      if (qaLines.length) {
        if (isX3DDriven) {
          console.log('pbUpdateDisplay: firing TTS for', safeName2, qaLines.length, 'lines, isX3DDriven=', isX3DDriven);
          pbSpeakQALines(qaLines, function() { pbReleaseDwell(safeName2); });
        } else {
          pbSpeakQALines(qaLines);
        }
      } else if (wp.response) {
        pbSpeak(wp.response);
        if (isX3DDriven) setTimeout(function(){ pbReleaseDwell(safeName2); }, 500);
      }
    }, ttsDelay);
  } else if (isNewStep && isX3DDriven) {
    // No dialogue at this waypoint — release dwell immediately so avatar keeps moving
    var safeName3 = (wp.cultivar||'').replace(/[^A-Za-z0-9_]/g,'_');
    var isX3DDriven2 = !!_x3dTimerActive['Avatar_' + safeName3];
    if (isX3DDriven2) setTimeout(function(){ pbReleaseDwell(safeName3); }, 100);
  }
  pbPushPosition(wp);
}

// pbUpdateDisplayFinal — displays and speaks the last waypoint only.
// Called from pbReleaseDwell when the last dwell expires and no next timer exists.
// Does NOT call pbReleaseDwell after TTS — arc is already complete.
function pbUpdateDisplayFinal(state) {
  if (!state || state.status === 'idle') return;
  var wp = state.current_waypoint || {};
  if (!wp.cultivar && state.cultivars && state.cultivars.length) {
    wp.cultivar = state.cultivars[0];
  }
  // Update the display panel
  var si = document.getElementById('pb-step-info');
  if (si) {
    var step = wp.stepno || state.step || 0;
    var total = state.total_steps || '?';
    si.innerHTML = '⏹ <b>' + (wp.cultivar||'') + '</b> &nbsp; step ' + step + ' / ' + total
      + (wp.id ? ' &nbsp;<span style="color:#4a6070">' + wp.id + '</span>' : '');
  }
  var qaLines = wp.qaLines || wp.qa_lines || [];
  var qr = document.getElementById('pb-qr');
  if (qaLines.length) {
    if (qr) qr.style.display = 'block';
    var qEl = document.getElementById('pb-question');
    if (qEl) qEl.textContent = qaLines.filter(function(l){return l.text&&l.text.trim();})
      .map(function(l){
        var p = l.type==='Question'?'Q':l.type==='Response'?'R':'—';
        return p + (l.speaker?' ['+l.speaker+']':'') + ': ' + l.text;
      }).join('\n');
    var rEl = document.getElementById('pb-response');
    if (rEl) rEl.textContent = '';
    // Speak final waypoint lines — no onComplete callback, arc is done.
    console.log('pbUpdateDisplayFinal: speaking final waypoint', wp.id, qaLines.length, 'lines');
    pbSpeakQALines(qaLines);
  } else if (qr) {
    qr.style.display = 'none';
  }
  pbPushPosition(wp);
  // Arc is complete — fire Chorus on server (async), then poll for response.
  // X3D-driven mode uses auto:false so the server-side PlaybackSession never
  // reaches its own arc-complete hook.  Client fires explicitly here instead.
  var arcFile = (document.getElementById('pb-file') || {}).value || '';
  if (arcFile) {
    fetch(API + '/chorus/fire', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({arc_file: arcFile})
    }).catch(function() {});
  }
  startChorusPoll();
}

// Fetch and cache the scene XML when the X3D scene loads
canvas.addEventListener('load', function() {
  var src = canvas.getAttribute('src') || 'mccf_scene.x3d';
  fetch(src)
    .then(function(r){ if(r.ok) return r.text(); throw new Error('fetch failed'); })
    .then(function(txt){ window._loadedSceneXml = txt; _pbSceneVoiceMap = null; })
    .catch(function(e){ console.warn('Could not cache scene XML:', e); });
});

function resetToStartPosition() {
  _refreshAvatarNodeNames();
  // Prefer scene definition XML (has EmotionalArc+StartPosition)
  // Fall back to cached X3D scene XML
  var xmlText = window._loadedSceneDefXml || window._loadedSceneXml;
  if (xmlText) {
    _applyStartPosition(xmlText);
    return;
  }
  // Try fetching scene XML now if not cached
  var src = (canvas && canvas.getAttribute('src')) || '/static/mccf_scene.x3d';
  fetch(src)
    .then(function(r){ return r.ok ? r.text() : Promise.reject('fetch failed'); })
    .then(function(txt){
      window._loadedSceneXml = txt;
      _applyStartPosition(txt);
    })
    .catch(function(){
      console.warn('resetToStartPosition: could not fetch scene XML — snapping to first arc waypoint or origin');
      _snapToFirstArcWaypoint();
    });
}

function _snapToFirstArcWaypoint() {
  // If an arc is loaded, use its first waypoint position as a better fallback than 0,0,0
  var firstWp = window._pbFirstWaypoint;
  if (firstWp && firstWp.pos_x !== undefined) {
    _moveAvatars(parseFloat(firstWp.pos_x)||0, 0, parseFloat(firstWp.pos_z)||0);
  } else {
    _snapAvatarsToOrigin();
  }
}

function _refreshAvatarNodeNames() {
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var names = window._avatarNodeNames || [];
    // Also scan for any Avatar_ nodes not yet registered
    var extras = [];
    try {
      // Try iterating scene named nodes (X_ITE specific)
      var allNames = scene.namedNodes ? Object.keys(scene.namedNodes) : [];
      allNames.forEach(function(n){
        if (n.startsWith('Avatar_') && names.indexOf(n) === -1) extras.push(n);
      });
    } catch(e) {}
    if (extras.length) window._avatarNodeNames = names.concat(extras);
  } catch(e) {}
}

function _applyStartPosition(xmlText) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(xmlText, 'text/xml');
  // Each <EmotionalArc cultivar="X"> has its own <StartPosition x y z>
  // Move each avatar to its own start, not all to the same point.
  var arcs = doc.querySelectorAll('EmotionalArc[cultivar]');
  if (!arcs.length) {
    // Fallback: single <StartPosition> moves all avatars
    var sp = doc.querySelector('StartPosition');
    if (!sp) {
      console.warn('resetToStartPosition: no StartPosition in scene XML — snapping to origin');
      _snapAvatarsToOrigin();
      return;
    }
    _moveAvatars(parseFloat(sp.getAttribute('x')||0), parseFloat(sp.getAttribute('y')||0), parseFloat(sp.getAttribute('z')||0));
    return;
  }
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    arcs.forEach(function(arc) {
      var cultivar = arc.getAttribute('cultivar');
      var sp = arc.querySelector('StartPosition');
      if (!cultivar || !sp) return;
      var x = parseFloat(sp.getAttribute('x')||0);
      var y = parseFloat(sp.getAttribute('y')||0);
      var z = parseFloat(sp.getAttribute('z')||0);
      var suffix = cultivar.replace(/[^A-Za-z0-9_]/g,'_');
      var node = scene.getNamedNode('Avatar_' + suffix);
      if (node) {
        node.translation = new X3D.SFVec3f(x, y, z);
        console.log('resetToStartPosition:', 'Avatar_'+suffix, '->', x, y, z);
      } else {
        console.warn('resetToStartPosition: node not found for cultivar:', cultivar);
      }
    });
  } catch(e) { console.warn('_applyStartPosition error:', e); }
}

function _snapAvatarsToOrigin() {
  // Move all known avatars to 0,0,0 as a safe fallback
  _moveAvatars(0, 0, 0);
  console.log('resetToStartPosition: snapped to origin (no StartPosition found)');
}

function _moveAvatars(x, y, z) {
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var names = window._avatarNodeNames || [];
    if (!names.length) {
      console.warn('_moveAvatars: no avatar names registered yet');
      return;
    }
    names.forEach(function(name) {
      try {
        var node = scene.getNamedNode(name);
        if (node) {
          node.translation = new X3D.SFVec3f(x, y, z);
          console.log('Moved', name, 'to', x, y, z);
        } else {
          console.warn('_moveAvatars: node not found:', name);
        }
      } catch(e) { console.warn('_moveAvatars:', name, e.message); }
    });
  } catch(e) { console.warn('_moveAvatars error:', e); }
}

// Cache scene XML and avatar node names when playback file changes or scene loads.
// Called from pbLoadFiles after the arc metadata arrives.
function cacheSceneContext(files) {
  // Collect all Avatar_ DEF names from the X3D scene
  try {
    var scene = canvas.browser.currentScene;
    if (scene) {
      var names = [];
      // Walk named nodes looking for Avatar_ prefix
      // X_ITE doesn't expose a full node iterator — use the arc file metadata instead
      (files || []).forEach(function(f) {
        if (f.cultivar) {
          var sn = f.cultivar.replace(/[^A-Za-z0-9_]/g,'_');
          var nodeName = 'Avatar_' + sn;
          if (names.indexOf(nodeName) === -1) names.push(nodeName);
        }
      });
      window._avatarNodeNames = names;
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────
// X3D scene file selector
// ─────────────────────────────────────────────
async function x3dLoadFiles() {
  try {
    const r = await fetch(API + '/scene/x3d/list');
    const data = await r.json();
    const sel = document.getElementById('x3d-file');
    if (!sel) return;
    var current = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    (data.files || []).forEach(function(fname) {
      var opt = document.createElement('option');
      opt.value = fname;
      opt.textContent = fname;
      sel.appendChild(opt);
    });
    // Restore previous selection or auto-select first file
    if (current && [...sel.options].some(o => o.value === current)) {
      sel.value = current;
    } else if (sel.options.length > 1) {
      sel.selectedIndex = 1;
      x3dFileChanged();
    }
  } catch(e) {
    console.warn('x3dLoadFiles: could not reach /scene/x3d/list', e);
  }
}

function x3dFileChanged() {
  var sel = document.getElementById('x3d-file');
  if (!sel) return;
  var fname = sel.value;
  if (!fname) return;
  var canvas = document.getElementById('x3d');
  if (!canvas) return;
  canvas.src = API + '/static/x3d/' + fname;
  console.log('x3dFileChanged: loaded', fname);
  // Notify server so ChorusManager can load config from matching scene XML.
  var sceneName = fname.replace(/\.x3d$/i, '');
  fetch(API + '/chorus/load', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({scene_name: sceneName})
  }).then(function(r){ return r.json(); })
    .then(function(d){ console.log('Chorus config:', JSON.stringify(d)); })
    .catch(function(){});
}

window.addEventListener('load', function() {
  setTimeout(function() {
    x3dLoadFiles();
    pbLoadFiles();
  }, 800);
});

// ─────────────────────────────────────────────
// Greek Chorus — overlay display (v1)
// ─────────────────────────────────────────────

var _chorusLastTimestamp = 0;
var _chorusPollTimer = null;

/**
 * startChorusPoll() — called from pbUpdateDisplayFinal() at arc-complete.
 * Polls /chorus/state until a new response arrives (up to 90 s).
 * Async: LLM latency is covered while audience watches the final pose.
 */
function startChorusPoll() {
  stopChorusPoll();
  var deadline = Date.now() + 90000;
  _chorusPollTimer = setInterval(function() {
    if (Date.now() > deadline) { stopChorusPoll(); return; }
    fetch(API + '/chorus/state', {signal: AbortSignal.timeout(2000)})
      .then(function(r) { return r.json(); })
      .then(function(d) {
        // Show if text is non-empty and newer than last displayed
        if (d.text && d.timestamp > _chorusLastTimestamp) {
          _chorusLastTimestamp = d.timestamp;
          displayChorus(d);
          stopChorusPoll();
        }
      })
      .catch(function() {});
  }, 800);
}

function stopChorusPoll() {
  if (_chorusPollTimer) { clearInterval(_chorusPollTimer); _chorusPollTimer = null; }
}

function displayChorus(data) {
  var overlay = document.getElementById('chorus-overlay');
  var textEl  = document.getElementById('chorus-text');
  var zoneEl  = document.getElementById('chorus-zone-label');
  if (!overlay || !textEl) return;

  textEl.textContent = data.text || '';
  if (zoneEl) zoneEl.textContent = data.zone_id ? ('[ ' + data.zone_id.toUpperCase() + ' ]') : '';

  overlay.style.display = 'block';
  // Reset CSS animation so fade-in replays each time
  overlay.style.animation = 'none';
  void overlay.offsetWidth;
  overlay.style.animation = '';

  // Auto-dismiss after 18 s
  clearTimeout(window._chorusAutoDismiss);
  window._chorusAutoDismiss = setTimeout(dismissChorus, 18000);

  // v2 hook — if server returns display="x3d" and a viewpoint, cut camera.
  // Viewpoint cut IS the coverage for LLM latency per Day 12 design.
  if (data.display === 'x3d' && data.viewpoint) {
    gotoVP(data.viewpoint);
  }

  console.log('Chorus displayed:', data.text);
}

function dismissChorus() {
  var overlay = document.getElementById('chorus-overlay');
  if (overlay) overlay.style.display = 'none';
  clearTimeout(window._chorusAutoDismiss);
  // Clear server state so stale text doesn't re-appear on next arc
  fetch(API + '/chorus/clear', {method: 'POST'}).catch(function() {});
}
