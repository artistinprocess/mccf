      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({filename: sceneName + '_scene.xml'})
    })
    .then(function(r){ return r.ok ? r.text() : Promise.reject('not found'); })
    .then(function(txt){
      // Store the raw response — we need the scene XML not the parsed JSON
      // Re-fetch as raw XML from scenes/ dir via a direct file fetch isn't available
      // Instead: rebuild EmotionalArc XML fragment from JSON response for voice/position use
      try {
        var data = JSON.parse(txt);
        // Reconstruct minimal scene def XML from placedAgents for voice map + start positions
        var frag = '<Scene>';
        Object.values(data.placedAgents || {}).forEach(function(a) {
          var pos = a.position || [0,0,0];
          frag += '<EmotionalArc cultivar="'+_xe(a.name)+'" voice="'+_xe(a.voice||'')+'">'
                + '<StartPosition x="'+pos[0]+'" y="'+pos[1]+'" z="'+pos[2]+'"/>'
                + '</EmotionalArc>';
        });
        frag += '</Scene>';
        window._loadedSceneDefXml = frag;
        _pbSceneVoiceMap = null;
      } catch(e) { console.warn('pbFileChanged: scene parse error', e); }
    })
    .catch(function(e){ console.warn('pbFileChanged: could not load scene def', e); });
  }
}

function pbVoiceChanged() {
  var on = document.getElementById('pb-voice');
  if (on && on.checked) pbLoadVoices();
}

function pbLoadVoices() {
  if (!window.speechSynthesis) return;
  function populate() {
    var voices = speechSynthesis.getVoices().filter(function(v){
      return v.lang.startsWith('en');
    });
    if (!voices.length) return;
    _pbVoices = voices;
    // Rebuild scene voice map with newly loaded voices
    _pbSceneVoiceMap = null;
  }
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = populate;
  populate();
}

// Pre-load voices on page ready so they are available when checkbox is first checked
window.addEventListener('load', function() {
  if (window.speechSynthesis) {
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = function() { pbLoadVoices(); };
    }
    setTimeout(pbLoadVoices, 200);
  }
});

function pbSpeak(text) {
  var voiceEl = document.getElementById('pb-voice');
  if (!voiceEl || !voiceEl.checked) return;
  if (!text || text === _pbLastSpoken) return;
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  // Use scene voice map default (first voice) — no manual dropdown
  if (_pbVoices.length) utt.voice = _pbVoices[0];
  utt.rate = 0.95;
  speechSynthesis.speak(utt);
  _pbLastSpoken = text;
}

// Speak all qa_lines in sequence, assigning voice by speaker name
// Voice lookup priority: (1) scene XML voice= attribute, (2) rotation fallback
var _pbSpeakerVoiceMap = {};  // speaker name -> SpeechSynthesisVoice object (resolved once)

function _xe(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function _buildSceneVoiceMapFromCultivars() {
  // Preferred path: read voice directly from /cultivars/xml (Character Creator is authoritative)
  var map = {};
  if (!_pbVoices.length) return map;
  try {
    var r = await fetch(API + '/cultivars/xml');
    if (!r.ok) return map;
    var data = await r.json();
    (data.cultivars || []).forEach(function(c) {
      var name = c.agentname;
      var voiceName = c.voice_name;
      if (!name || !voiceName) return;
      function baseVoiceName(s) {
        return s.replace(/\s*-\s*[A-Z].*$/, '').replace(/\s+Desktop\b.*$/, '').replace(/\s*\(.*\)\s*$/, '').trim().toLowerCase();
      }
      var voiceBase = baseVoiceName(voiceName);
      var v = _pbVoices.find(function(v){ return v.name === voiceName; })
           || _pbVoices.find(function(v){ return v.name.indexOf(voiceName) === 0; })
           || _pbVoices.find(function(v){ return voiceName.indexOf(v.name) === 0; })
           || _pbVoices.find(function(v){ return baseVoiceName(v.name) === voiceBase; });
      if (v) map[name] = v;
    });
  } catch(e) { console.warn('_buildSceneVoiceMapFromCultivars error:', e); }
  return map;
}

function _buildSceneVoiceMap() {
  // Fallback path: parse <EmotionalArc cultivar="X" voice="Y"> from loaded scene XML
  // Used when /cultivars/xml is unavailable or returns no voice data.
  var map = {};
  var src = window._loadedSceneDefXml || window._loadedSceneXml;
  if (!src || !_pbVoices.length) return map;
  try {
    var doc = new DOMParser().parseFromString(src, 'text/xml');
    doc.querySelectorAll('EmotionalArc').forEach(function(el) {
      var name = el.getAttribute('cultivar');
      var voiceName = el.getAttribute('voice');
      if (!name || !voiceName) return;
      function baseVoiceName(s) {
        return s.replace(/\s*-\s*[A-Z].*$/, '').replace(/\s+Desktop\b.*$/, '').replace(/\s*\(.*\)\s*$/, '').trim().toLowerCase();
      }
      var voiceBase = baseVoiceName(voiceName);
      var v = _pbVoices.find(function(v){ return v.name === voiceName; })
           || _pbVoices.find(function(v){ return v.name.indexOf(voiceName) === 0; })
           || _pbVoices.find(function(v){ return voiceName.indexOf(v.name) === 0; })
           || _pbVoices.find(function(v){ return baseVoiceName(v.name) === voiceBase; });
      if (v) map[name] = v;
    });
  } catch(e) { console.warn('_buildSceneVoiceMap error:', e); }
  return map;
}

var _pbSceneVoiceMap = null;  // built once per scene load

// Pending onComplete callback for in-progress TTS — keyed by TTS content key.
// When pbSpeakQALines is called with the same lines (duplicate key), the new onComplete
// replaces the old one so the correct callback fires when speech finishes.
var _pbPendingOnComplete = {};

// _pbSpeakToken, _pbLastSpoken, _pbLastStepKey are now per-cultivar dicts (declared above).

function pbSpeakQALines(qaLines, onComplete, cultivarKey) {
  // cultivarKey — safe name of the speaking cultivar (e.g. 'Cindy', 'The_Steward').
  // Used to key _pbLastSpoken, _pbSpeakToken per cultivar so concurrent arcs
  // do not cancel each other's TTS chains.
  // Callers that don't pass cultivarKey fall back to a shared '__default__' key
  // (single-arc compat).
  var ck = cultivarKey || '__default__';

  var voiceEl = document.getElementById('pb-voice');
  if (!voiceEl || !voiceEl.checked) {
    console.log('pbSpeakQALines: voice off — firing onComplete immediately for', ck);
    if (onComplete) onComplete();
    return;
  }
  if (!window.speechSynthesis || !qaLines || !qaLines.length) {
    console.log('pbSpeakQALines: no speech engine or empty lines — firing onComplete for', ck);
    if (onComplete) onComplete();
    return;
  }
  var key = qaLines.map(function(l){return l.text;}).join('|');
  if (key === (_pbLastSpoken[ck] || '')) {
    // Same lines already queued or speaking for this cultivar — replace pending onComplete.
    if (onComplete) {
      _pbPendingOnComplete[ck + '|' + key] = onComplete;
      console.log('pbSpeakQALines: duplicate [' + ck + '] — replaced pending onComplete');
    }
    return;
  }
  _pbLastSpoken[ck] = key;
  if (onComplete) _pbPendingOnComplete[ck + '|' + key] = onComplete;

  // Per-cultivar cancellation token — only invalidates this cultivar's chain,
  // not other cultivars speaking concurrently.
  _pbSpeakToken[ck] = (_pbSpeakToken[ck] || 0) + 1;
  var myToken = _pbSpeakToken[ck];

  function _ensureVoiceMapThenSpeak(retriesLeft) {
    if (!_pbVoices.length) {
      if (window.speechSynthesis) {
        var v = speechSynthesis.getVoices().filter(function(v){ return v.lang.startsWith('en'); });
        if (v.length) _pbVoices = v;
      }
    }
    if ((!_pbSceneVoiceMap || Object.keys(_pbSceneVoiceMap).length === 0) && _pbVoices.length) {
      _buildSceneVoiceMapFromCultivars().then(function(map) {
        if (Object.keys(map).length > 0) {
          _pbSceneVoiceMap = map;
        } else {
          _pbSceneVoiceMap = _buildSceneVoiceMap();
        }
        _continueAfterVoiceMap(retriesLeft);
      }).catch(function() {
        _pbSceneVoiceMap = _buildSceneVoiceMap();
        _continueAfterVoiceMap(retriesLeft);
      });
      return;
    }
    _continueAfterVoiceMap(retriesLeft);
  }

  function _continueAfterVoiceMap(retriesLeft) {
    if (!_pbVoices.length && retriesLeft > 0) {
      setTimeout(function(){ _ensureVoiceMapThenSpeak(retriesLeft - 1); }, 300);
      return;
    }
    // Acquire global speech lock — only one cultivar speaks at a time.
    // If locked, enqueue this cultivar's speech chain for later.
    if (_pbSpeechLock) {
      _pbSpeechQueue.push(function() { _doSpeak(); });
      console.log('pbSpeakQALines: [' + ck + '] queued (speech lock held), queue length', _pbSpeechQueue.length);
      return;
    }
    _pbSpeechLock = true;
    _doSpeak();
  }

  function _doSpeak() {
    var queue = qaLines.filter(function(l){return l.text && l.text.trim();});
    var capturedKey   = key;
    var capturedCk    = ck;
    var capturedToken = myToken;
    var rotationCount = 0;
    function speakNext(i) {
      if ((_pbSpeakToken[capturedCk] || 0) !== capturedToken) {
        console.log('pbSpeakQALines: [' + capturedCk + '] cancelled (token mismatch) — suppressing onComplete');
        _pbSpeechLock = false;
        _drainSpeechQueue();
        return;
      }
      if (i >= queue.length) {
        // Chain complete — release lock and drain next waiting cultivar
        _pbSpeechLock = false;
        var cbKey = capturedCk + '|' + capturedKey;
        var cb = _pbPendingOnComplete[cbKey];
        delete _pbPendingOnComplete[cbKey];
        _drainSpeechQueue();
        if (cb) cb();
        return;
      }
      var line = queue[i];
      var utt = new SpeechSynthesisUtterance(line.text);
      utt.rate = 0.95;
      var speaker = line.speaker || (line.type === 'Question' ? '__Q__' : '__R__');
      var sceneVoice = _pbSceneVoiceMap && _pbSceneVoiceMap[speaker];
      if (sceneVoice) {
        utt.voice = sceneVoice;
      } else {
        if (_pbSpeakerVoiceMap[speaker] === undefined) {
          _pbSpeakerVoiceMap[speaker] = rotationCount % Math.max(1, _pbVoices.length);
          rotationCount++;
        }
        if (_pbVoices[_pbSpeakerVoiceMap[speaker]]) utt.voice = _pbVoices[_pbSpeakerVoiceMap[speaker]];
      }
      // Timeout fallback: if browser blocks speech (no user gesture, AudioContext issue),
      // utt.onend never fires. After 8s per line, force advance so arc doesn't stall.
      var _uttDone = false;
      var _uttTimeout = setTimeout(function() {
        if (!_uttDone) { _uttDone = true; speakNext(i+1); }
      }, 8000);
      utt.onend  = function() { if (!_uttDone) { _uttDone = true; clearTimeout(_uttTimeout); speakNext(i+1); } };
      utt.onerror = function() { if (!_uttDone) { _uttDone = true; clearTimeout(_uttTimeout); speakNext(i+1); } };
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        console.log('pbSpeakQALines: resumed paused speechSynthesis before speak');
      }
      console.log('pbSpeakQALines: speak()', line.text.substring(0,40),
                  'voice=', utt.voice ? utt.voice.name : 'default',
                  'pending=', speechSynthesis.pending,
                  'paused=', speechSynthesis.paused);
      speechSynthesis.speak(utt);
    }
    speakNext(0);
  }

  _ensureVoiceMapThenSpeak(3);
}

// _drainSpeechQueue — called when speech lock is released.
// Starts the next waiting cultivar's speech chain if any.
function _drainSpeechQueue() {
  if (_pbSpeechLock || _pbSpeechQueue.length === 0) return;
  var next = _pbSpeechQueue.shift();
  if (next) {
    _pbSpeechLock = true;
    next();
  }
}

// Track last arrived segment per agent — set by segmentArrived callback
var _x3dLastArrivedSeg = {};

// Guard: set true when the final waypoint TTS has been handed off, preventing
// a second pbReleaseDwell call (from the onComplete chain) from re-entering.
var _pbArcComplete = {};  // {agentSafeName: bool} — per-agent arc-complete flag
var _pbExpectedAgents = 0;      // set by pbPlayAll/pbPlay — how many agents are expected
var _pbLastArcFiles = [];       // kept for legacy/debug; not used for Chorus firing
var _chorusTranscript = [];     // [{label, speaker, text}] — accumulated live during playback
var _chorusFinalCV   = {};      // {E,B,P,S} — CV from the last waypoint of the last agent to complete
var _pbCultivarSessionMap = {}; // {cultivarSafeName: session_id} — set by pbPlayAll

function pbReleaseDwell(agentSafeName) {
  console.log('pbReleaseDwell: ENTERED for', agentSafeName, 'seg=', _x3dLastArrivedSeg[agentSafeName]||0, '_pbArcComplete=', !!_pbArcComplete[agentSafeName]);
  // Called after TTS completes for an X3D-driven agent.
  //
  // Architecture (Day 18 — self-contained Arrival scripts):
  //   Each Arrival_X script owns its movement chain.
  //   JS communicates via two Arrival fields only:
  //     startFromLoader (SFBool)  — kicks Timer_1 after WP1 dwell
  //     advanceSeg (SFInt32)      — sends completed seg number; Arrival starts next timer
  //   MCCFMaster is NOT used for movement. No shared SFString bus. N-agent safe.

  if (_pbArcComplete[agentSafeName]) {
    console.log('pbReleaseDwell: arc already complete — ignoring spurious call for', agentSafeName);
    return;
  }
  if (!canvas || !canvas.browser) return;

  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var seg = _x3dLastArrivedSeg[agentSafeName] || 0;

    // seg=0: WP1 TTS complete, no segment arrived yet.
    // Wait dwell interval (Dwell_X_1 cycleInterval) then fire Arrival_X.startFromLoader.
    // Dwell_X_1 node NOT started here — reserved for after seg=1 arrives.
    if (seg === 0) {
      var dwell0Name = 'Dwell_' + agentSafeName + '_1';
      var dwell0Node = null;
      try { dwell0Node = scene.getNamedNode(dwell0Name); } catch(e) {}
      var dwell0Interval = dwell0Node ? (dwell0Node.cycleInterval || 2.0) : 2.0;
      var _agentForStart = agentSafeName;
      console.log('pbReleaseDwell: WP1 complete — waiting', dwell0Interval,
                  's then firing startFromLoader for', agentSafeName);
      setTimeout(function() {
        try {
          var arr = canvas.browser.currentScene.getNamedNode('Arrival_' + _agentForStart);
          if (arr) {
            // Read scene time from Timer_1 node directly — canvas.browser.currentTime
            // returns 0 in X_ITE when called from JS context. Timer.time is the live
            // scene clock and is always valid once the scene is running.
                    // Pass startTime slightly in the future (+100ms) so X_ITE has one
            // render frame to prepare before the timer begins evaluating fraction.
            // Using past time causes immediate mid-path snap on fast machines.
            var _tSrc = 'unknown';
            var tNow = (function() {
              var t = canvas && canvas.browser && canvas.browser.currentTime;
              if (t && t > 1.0) { _tSrc = 'browser.currentTime'; return t + 0.1; }
              var wall = performance.now() / 1000;
              if (wall > 1.0) { _tSrc = 'performance.now'; return wall + 0.1; }
              return 0.1;
            })();
            arr.startFromLoader = tNow;
            console.log('pbReleaseDwell: startFromLoader fired for', _agentForStart, 'at t=', tNow, 'src=', _tSrc);
            // Walk starts when Timer_1 isActive=true fires — handled by _wirePathTimerBehavior.
          } else {
            console.warn('pbReleaseDwell: Arrival_' + _agentForStart + ' not found');
          }
        } catch(e) { console.warn('pbReleaseDwell startFromLoader error:', e); }
      }, Math.round(dwell0Interval * 1000));
      return;
    }

    // seg>0: segment just arrived — start Dwell, then advance.
    var dwellNodeName = 'Dwell_' + agentSafeName + '_' + seg;
    var dwellNode = null;
    try { dwellNode = scene.getNamedNode(dwellNodeName); } catch(e) {}

    if (!dwellNode) {
      console.warn('pbReleaseDwell: ' + dwellNodeName + ' not found — advancing immediately');
      _pbAdvanceSeg(agentSafeName, seg);
      return;
    }

    try {
      dwellNode.startTime = _x3dNow(agentSafeName) || (performance.now() / 1000);
      dwellNode.enabled   = true;
      console.log('pbReleaseDwell: started', dwellNodeName, 'for', agentSafeName, 'seg', seg);
    } catch(e) {
      console.warn('pbReleaseDwell: could not start dwell node:', e);
    }
    // DefaultTimer fires when Timer_N fraction_changed>=0.99 — handled by _wirePathTimerBehavior.
    // pbReleaseDwell owns dwell timing only, not behavior switching.

    var dwellInterval  = dwellNode.cycleInterval || 2.0;
    var _capturedAgent = agentSafeName;
    var _capturedSeg   = seg;
    setTimeout(function() {
      _pbAdvanceSeg(_capturedAgent, _capturedSeg);
    }, Math.round(dwellInterval * 1000));

  } catch(e) {
    console.warn('pbReleaseDwell error:', e);
  }
}

// _pbAdvanceSeg — sends advanceSeg=completedSeg to Arrival_X after dwell expires.
// Arrival_X starts the next timer if one exists, or logs arc complete.
// If no next timer found in scene, JS fetches the final waypoint.
function _pbAdvanceSeg(agentSafeName, completedSeg) {
  if (_pbArcComplete[agentSafeName]) return;
  if (!canvas || !canvas.browser) return;
  try {
    var scene2 = canvas.browser.currentScene;
    if (!scene2) return;

    // Peek: does next timer exist?
    var nextTimerName = 'Timer_' + agentSafeName + '_' + (completedSeg + 1);
    var nextTimer = null;
    try { nextTimer = scene2.getNamedNode(nextTimerName); } catch(e) {}

    if (nextTimer) {
      var arr = null;
      try { arr = scene2.getNamedNode('Arrival_' + agentSafeName); } catch(e) {}
      if (arr) {
        arr.advanceSeg = completedSeg;
        console.log('_pbAdvanceSeg: advanceSeg=' + completedSeg + ' sent to Arrival_' + agentSafeName);
        // WalkTimer is switched on by segmentArrived callback when the next
        // segment fires — do NOT switch here to avoid a race with the dwell DefaultTimer.
      }
    } else {
      // Last segment — fetch and display final waypoint for THIS agent's session
      console.log('_pbAdvanceSeg: last segment for', agentSafeName, '— fetching final waypoint');
      _pbArcComplete[agentSafeName] = true;
      var _completedCount = Object.keys(_pbArcComplete).filter(function(k){ return _pbArcComplete[k]; }).length;
      var _allDone = (_pbExpectedAgents > 0 && _completedCount >= _pbExpectedAgents);
      console.log('_pbAdvanceSeg: completed', _completedCount, '/', _pbExpectedAgents, 'allDone=', _allDone);
      // Route step to this agent's specific session (pbPlayAll) or global (pbPlay)
      var _sid = _pbCultivarSessionMap[agentSafeName] || null;
      var _stepUrl = _sid
        ? (API + '/arc/playback/step')
        : (API + '/arc/playback/step');
      var _stepBody = _sid
        ? JSON.stringify({session_id: _sid})
        : '{}';
      fetch(_stepUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: _stepBody
      })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          // For pbPlayAll: extract this agent's session state from the response
          var _agentState = d;
          if (_sid && d.sessions && d.sessions[_sid]) {
            _agentState = d.sessions[_sid].state || d.sessions[_sid];
          }
          pbUpdateDisplayFinal(_agentState, _allDone);
        })
        .catch(function(e) { console.warn('final waypoint fetch failed:', e); });
    }
  } catch(e) {
    console.warn('_pbAdvanceSeg error:', e);
  }
}

// Track which avatar safenames are being driven by X3D TimeSensor (not JS lerp)
var _x3dTimerActive = {};

function _x3dNow(agentSafeName) {
  // Returns current X_ITE scene time as a positive float, or null.
  // agentSafeName optional — if provided, tries to read from that agent's Dwell node
  // (startTime + cycleInterval = completion time = approximately now).
  // Multiple strategies tried in order of reliability.
  try {
    // Strategy 1: browser.currentTime — works in some X_ITE builds, returns 0 in others
    var t = canvas && canvas.browser && canvas.browser.currentTime;
    if (t && t > 0) return t;

    // Strategy 2: read from the just-completed Dwell node for this agent
    // Dwell.startTime + Dwell.cycleInterval = the scene time when dwell ended = now
    if (agentSafeName && canvas.browser.currentScene) {
      var sc = canvas.browser.currentScene;
      try {
        var dw = sc.getNamedNode('Dwell_' + agentSafeName + '_1');
        if (dw && dw.startTime > 0 && dw.cycleInterval > 0) {
          var dwEnd = dw.startTime + dw.cycleInterval;
          if (dwEnd > 1.0) return dwEnd;
        }
      } catch(e2) {}
    }

    // Strategy 3: any running TimeSensor's .time field
    if (canvas && canvas.browser && canvas.browser.currentScene) {
      var scene = canvas.browser.currentScene;
      var activeKeys = Object.keys(_x3dTimerActive);
      for (var i = 0; i < activeKeys.length; i++) {
        var suffix = activeKeys[i].replace(/^Avatar_/, '');
        try {
          var tn = scene.getNamedNode('Timer_' + suffix + '_1');
          if (tn && tn.time > 0) return tn.time;
        } catch(e3) {}
      }
    }

    // Strategy 4: wall clock seconds since page load — always works, not scene time
    // but X_ITE scene clock tracks wall time closely after load
    var wall = performance.now() / 1000;
    if (wall > 1.0) return wall;

  } catch(e) {}
  return null;
}

// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// _buildPivotCacheFromSceneXml — parse full waypoint sequence per agent
// ─────────────────────────────────────────────
// Reads <Path agent="X"><PathWaypoint ref="wpName"/></Path> and
// <Waypoint name="wpName" pos_x="X" pos_z="Z"/> from scene XML.
// Builds _agentWaypointCache[safeName] = {1:{pos_x,pos_z}, 2:..., ...}
// indexed 1-based by path order. Called at play start from _parseSceneZoneData.
function _buildPivotCacheFromSceneXml(doc) {
  // Build name→position map from all Waypoint elements
  var posMap = {};
  doc.querySelectorAll('Waypoint').forEach(function(el) {
    var name = el.getAttribute('name');
    var px   = el.getAttribute('pos_x');
    var pz   = el.getAttribute('pos_z');
    if (name && px !== null && pz !== null) {
      posMap[name] = { pos_x: parseFloat(px), pos_z: parseFloat(pz) };
    }
  });

  // Build ordered cache per agent from Path/PathWaypoint sequence
  doc.querySelectorAll('Path').forEach(function(pathEl) {
    var agent    = pathEl.getAttribute('agent') || '';
    var safeName = agent.replace(/[^A-Za-z0-9_]/g, '_');
    if (!safeName) return;

    var refs = pathEl.querySelectorAll('PathWaypoint');
    if (!refs.length) return;

    var cache = {};
    var stepNo = 1;
    refs.forEach(function(ref) {
      var wpName = ref.getAttribute('ref');
      if (wpName && posMap[wpName]) {
        cache[stepNo] = posMap[wpName];
        stepNo++;
      }
    });

    if (Object.keys(cache).length > 0) {
      _agentWaypointCache[safeName] = cache;
      console.log('_buildPivotCacheFromSceneXml:', safeName,
        Object.keys(cache).length, 'waypoints —',
        Object.values(cache).map(function(p){
          return '(' + p.pos_x + ',' + p.pos_z + ')';
        }).join(' → '));
    }
  });
}

// _pivotAgentToSegment — rotate avatar to face direction of travel
// ─────────────────────────────────────────────
// Writes Y-axis rotation to Avatar_ parent Transform at transit start.
// heading = atan2(dx, dz): angle from +Z toward +X in X3D Y-up world.
function _pivotAgentToSegment(safeName, seg) {
  var cache = _agentWaypointCache[safeName] || {};
  // Cache is keyed by 1-based stepNo. Segment seg: from step seg → step seg+1.
  var fromWP = cache[seg];
  var toWP   = cache[seg + 1];

  // Fallback: if stepno-keyed positions missing, try _waypointPosMap by name.
  // Arc step IDs (wp.id) are stored in cache as a side-channel when available.
  if (!fromWP || !toWP) {
    var fromId = cache['id_' + seg];
    var toId   = cache['id_' + (seg + 1)];
    if (fromId && _waypointPosMap[fromId]) fromWP = _waypointPosMap[fromId];
    if (toId   && _waypointPosMap[toId])   toWP   = _waypointPosMap[toId];
  }

  if (!fromWP || !toWP) {
    console.log('_pivotAgentToSegment: missing waypoints for', safeName,
      'seg', seg, '— cache keys:', Object.keys(cache).join(','));
    return;
  }

  var dx = parseFloat(toWP.pos_x || 0) - parseFloat(fromWP.pos_x || 0);
  var dz = parseFloat(toWP.pos_z || 0) - parseFloat(fromWP.pos_z || 0);
  if (Math.abs(dx) < 0.001 && Math.abs(dz) < 0.001) return;

  var heading = Math.atan2(dx, dz);

  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var avatarNode = scene.getNamedNode('Avatar_' + safeName);
    if (!avatarNode) return;
    avatarNode.rotation = new X3D.SFRotation(0, 1, 0, heading);
    console.log('_pivotAgentToSegment:', safeName, 'seg', seg,
      'dx=' + dx.toFixed(2), 'dz=' + dz.toFixed(2),
      'heading=' + (heading * 180 / Math.PI).toFixed(1) + 'deg');
  } catch(e) {
    console.warn('_pivotAgentToSegment error:', safeName, e.message);
  }
}

// _wirePathTimerBehavior — wire isActive/fraction_changed on path Timer nodes
// ─────────────────────────────────────────────
// Uses pure X3D timer events to drive walk/idle — no setTimeout, no TTS coupling.
//   Timer_N isActive TRUE       → WalkTimer on   (transit begins)
//   Timer_N fraction_changed≥0.99 → DefaultTimer on (transit ends)
// Called after behavior timer map resolves, once per agent per play.
// segCount = number of path segments = total_steps - 1.
function _wirePathTimerBehavior(safeName, gen) {
  var scene;
  try { scene = canvas.browser.currentScene; } catch(e) { return; }
  if (!scene) return;

  // Probe for Timer_N_1 through Timer_N_8 — wire whichever exist.
  // No need to know segCount in advance.
  var MAX_SEGS = 8;
  for (var seg = 1; seg <= MAX_SEGS; seg++) {
    (function(s) {
      var timerName = 'Timer_' + safeName + '_' + s;
      var timerNode;
      try { timerNode = scene.getNamedNode(timerName); } catch(e) {}
      if (!timerNode) {
        console.log('_wirePathTimerBehavior: ' + timerName + ' not found — skipping');
        return;
      }

      // isActive TRUE → WalkTimer on
      var isActiveField;
      try { isActiveField = timerNode.getField('isActive'); } catch(e) {}
      if (isActiveField && typeof isActiveField.addFieldCallback === 'function') {
        isActiveField.addFieldCallback('bhWalk_' + safeName + '_' + s + '_' + gen, function(value) {
          if (_pbCbGeneration !== gen) return;
          if (value === true || value === 'true' || value === 1) {
            console.log('Timer ' + timerName + ' isActive=true → pivot then WalkTimer');
            // Pivot first so avatar faces direction of travel before walking.
            // 50ms gap gives X3D one render frame to apply the rotation.
            var _pivName = safeName;
            var _pivSeg  = s;
            var _pivGen  = gen;
            _pivotAgentToSegment(_pivName, _pivSeg);
            setTimeout(function() {
              if (_pbCbGeneration !== _pivGen) return;
              _switchBehaviorTimer(_pivName, 'WalkTimer', null);
            }, 50);
          }
        });
      }

      // fraction_changed >= 0.99 → DefaultTimer on (end of transit)
      var fracField;
      try { fracField = timerNode.getField('fraction_changed'); } catch(e) {}
      if (fracField && typeof fracField.addFieldCallback === 'function') {
        var _arrived = false;  // one-shot per timer run
        fracField.addFieldCallback('bhIdle_' + safeName + '_' + s + '_' + gen, function(value) {
          if (_pbCbGeneration !== gen) return;
          var f = parseFloat(value);
          if (f >= 0.99 && !_arrived) {
            _arrived = true;
            console.log('Timer ' + timerName + ' fraction=' + f.toFixed(3) + ' → DefaultTimer');
            _switchBehaviorTimer(safeName, 'DefaultTimer', null);
          }
          // Reset one-shot when timer restarts (fraction drops back toward 0)
          if (f < 0.05) _arrived = false;
        });
      }

      console.log('_wirePathTimerBehavior: wired ' + timerName);
    })(seg);
  }
}

function pbActivateX3DTimers(cultivars, cultivarSessionMap) {
  // cultivars: array of cultivar names to wire
  // cultivarSessionMap: optional {cultivarName: session_id} — if provided, each
  //   Arrival_ callback calls pbStepSession(session_id) instead of pbStep().
  //   Pass undefined/null for single-arc play (uses pbStep() fallback).
  // Uses cultivar names from arc playback state — does NOT enumerate scene.namedNodes
  // because X_ITE SAI does not expose Script DEF nodes via namedNodes enumeration.
  // getNamedNode('Arrival_Cindy') works; Object.keys(scene.namedNodes) misses Script nodes.
  console.log('pbActivateX3DTimers: entered, cultivars =', cultivars);
  if (!canvas || !canvas.browser) { console.warn('pbActivateX3DTimers: no browser'); return; }
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) { console.warn('pbActivateX3DTimers: no currentScene'); return; }
    _x3dTimerActive = {};
    // Kill any polls from a previous play before wiring new ones
    if (window._pbPollingSegment) {
      Object.keys(window._pbPollingSegment).forEach(function(k) {
        window._pbPollingSegment[k] = false;
      });
    }
    window._pbPollingSegment = {};

    if (!cultivars || cultivars.length === 0) {
      console.warn('pbActivateX3DTimers: no cultivars passed — cannot wire Arrival_ or start Timers');
      return;
    }

    cultivars.forEach(function(cultivarName) {
      var safeName = cultivarName.replace(/[^A-Za-z0-9_]/g, '_');
      var arrNodeName = 'Arrival_' + safeName;
      var timerNodeName = 'Timer_' + safeName + '_1';
      var avatarName = 'Avatar_' + safeName;
      // Session id for this cultivar — null means single-arc (use pbStep)
      var sid = (cultivarSessionMap && cultivarSessionMap[cultivarName]) || null;

      // Wire Arrival_ segmentArrived -> pbStepSession(sid) or pbStep()
      // addFieldCallback on outputOnly Script fields not reliably supported — always poll.
      try {
        var arrNode = scene.getNamedNode(arrNodeName);
        if (!arrNode) {
          console.warn('pbActivateX3DTimers: ' + arrNodeName + ' not found in scene');
        } else {
          var cbWired = false;
          try {
            var field = arrNode.getField('segmentArrived');
            if (field && typeof field.addFieldCallback === 'function') {
              var _lastCbSeg = -1;
              var _cbGen = _pbCbGeneration;  // capture generation at wire time
            // Key includes generation so re-registration on Reset+Replay always succeeds.
            // X_ITE ignores addFieldCallback if the key already exists — a stale key
            // from the previous run would block the new callback from wiring.
            field.addFieldCallback(arrNodeName + '_cb_' + _cbGen, function(value) {
                // Self-expire if a newer pbPlay has run
                if (_pbCbGeneration !== _cbGen) return;
                var seg = parseInt(value) || 0;
                if (seg <= _lastCbSeg) {
                  console.log('segmentArrived callback DUPLICATE suppressed: ' + arrNodeName + ' seg=' + seg);
                  return;
                }
                _lastCbSeg = seg;
                console.log('segmentArrived callback: ' + arrNodeName + ' seg=' + seg);
                _x3dLastArrivedSeg[safeName] = seg;
                // Walk/idle switching is now owned by _wirePathTimerBehavior:
                //   Timer_N isActive=true  → WalkTimer on
                //   Timer_N fraction≥0.99  → DefaultTimer on
                // segmentArrived only advances the arc step counter.
                if (sid) {
                  pbStepSession(sid);
                } else {
                  pbStep();
                }
              });
              cbWired = true;
              console.log('pbActivateX3DTimers: wired segmentArrived callback on', arrNodeName,
                          sid ? '(session: ' + sid + ')' : '(single-arc)', '— skipping poll');
            }
          } catch(cbErr) {}
          if (!cbWired) {
            console.log('pbActivateX3DTimers: addFieldCallback unavailable for', arrNodeName, '— using poll');
          }
          // Only install poll if callback not wired
          window._pbPollingSegment[arrNodeName] = !cbWired;
          if (!cbWired) (function(node, name, sessionId) {
            var lastSeg = -1;
            var _pollWasActive = window._pbPollingSegment[name];
            var pollId = setInterval(function() {
              if (!window._pbPollingSegment || !window._pbPollingSegment[name]) {
                clearInterval(pollId);
                if (_pollWasActive) console.log('pbActivateX3DTimers: poll stopped for', name);
                return;
              }
              try {
                var v = node.segmentArrived;
                if (v === undefined || v === null) {
                  var f = node.getField ? node.getField('segmentArrived') : null;
                  v = f ? f.getValue() : 0;
                }
                v = parseInt(v) || 0;
                if (v > lastSeg) {
                  lastSeg = v;
                  console.log('segmentArrived poll: ' + name + ' seg=' + v);
                  if (sessionId) {
                    pbStepSession(sessionId);
                  } else {
                    pbStep();
                  }
                }
              } catch(e) {}
            }, 200);
          })(arrNode, arrNodeName, sid);
        }
      } catch(e) { console.warn('pbActivateX3DTimers: could not wire', arrNodeName, e); }

      // Start Timer_{agent}_1
      try {
        var timerNode = scene.getNamedNode(timerNodeName);
        if (!timerNode) {
          console.warn('pbActivateX3DTimers: ' + timerNodeName + ' not found in scene');
        } else {
          // Mark avatar as X3D-driven so pbPushPosition and applyArcCV skip it.
          // Timer_1 is started by pbReleaseDwell after WP1 TTS+dwell completes,
          // via startAgent — same path as all subsequent timers use startNextTimer.
          _x3dTimerActive[avatarName] = true;
          console.log('pbActivateX3DTimers: armed X3D driving for', avatarName, '— Timer_1 starts after WP1 dwell');
        }
      } catch(e) { console.warn('pbActivateX3DTimers: could not start', timerNodeName, e); }

      // Task 2 — Build behavior timer map for this agent.
      // Maps base DEF names (e.g. 'WalkTimer') to live scene nodes.
      // Uses a JS-side map rather than DEF rename — X_ITE SAI does not expose
      // a reliable DEF rename API, and multi-instance addressing via JS map is
      // sufficient for MCCF's single-scene-per-session model.
      // The scene's <IMPORT> statements already register the timer nodes into the
      // parent scene's imported node table at parse time. We just need to retrieve
      // them via getImportedNode once the Inline has finished loading.
      // addImportedNode is NOT needed — calling it throws "already in use" because
      // the declarative IMPORT did it first. (Confirmed Day 24 diagnostic.)
      (function(sName, gen) {
        var attempts = 0;
        var MAX_ATTEMPTS = 20;
        var RETRY_MS = 250;
        function tryMapTimers() {
          if (_pbCbGeneration !== gen) return;  // reset fired — abandon
          attempts++;
          try {
            var sc = canvas.browser.currentScene;
            if (!sc) { if (attempts < MAX_ATTEMPTS) setTimeout(tryMapTimers, RETRY_MS); return; }

            // Confirm the Inline is present — DEF="HAnim_AgentSafeName"
            var inlineNode = null;
            try { inlineNode = sc.getNamedNode('HAnim_' + sName); } catch(e2) {}
            if (!inlineNode) {
              console.log('pbActivateX3DTimers: no HAnim_' + sName + ' Inline — cylinder or static avatar');
              return;
            }

            // Retrieve imported nodes registered by the scene's <IMPORT> statements.
            // AS names follow convention: TimerBase_AgentSafeName (e.g. DefaultTimer_Cindy).
            var timerMapForAgent = {};
            BEHAVIOR_TIMER_BASES.forEach(function(base) {
              var importedName = base + '_' + sName;
              try {
                var node = sc.getImportedNode(importedName);
                if (node) timerMapForAgent[base] = node;
              } catch(e2) {
                // Not yet available — Inline still loading
              }
            });

            var foundTimers = Object.keys(timerMapForAgent);
            if (foundTimers.length > 0) {
              _behaviorTimerMap[sName] = timerMapForAgent;
              console.log('pbActivateX3DTimers: behavior timers mapped for', sName,
                          '(attempt ' + attempts + ') —', foundTimers.join(', '));
              // Start DefaultTimer so avatar plays idle animation before first waypoint
              var defNode = timerMapForAgent['DefaultTimer'];
              if (defNode) {
                try {
                  // enabled=true is the correct mechanism — confirmed Day 25.
                  // startTime not needed; enabled=true begins the cycle immediately.
                  defNode.enabled = true;
                  _agentCurrentClip[sName]  = 'Default';
                  _agentLastLoopClip[sName] = 'Default';
                  console.log('pbActivateX3DTimers: DefaultTimer started for', sName);
                } catch(e3) {
                  console.warn('pbActivateX3DTimers: DefaultTimer start failed for', sName, e3);
                }
              }
              // Wire isActive/fraction_changed on all path Timer nodes for clean
              // walk/idle switching driven purely by X3D timer events.
              _wirePathTimerBehavior(sName, gen);
            } else if (attempts < MAX_ATTEMPTS) {
              console.log('pbActivateX3DTimers: behavior timers not yet available for', sName,
                          '— retry', attempts, '/', MAX_ATTEMPTS);
              setTimeout(tryMapTimers, RETRY_MS);
            } else {
              console.log('pbActivateX3DTimers: no behavior timers found for', sName,
                          '— gave up after', MAX_ATTEMPTS, 'attempts');
            }
          } catch(e) {
            console.warn('pbActivateX3DTimers: behavior timer map error for', sName, e);
            if (attempts < MAX_ATTEMPTS) setTimeout(tryMapTimers, RETRY_MS);
          }
        }
        tryMapTimers();
      })(safeName, _pbCbGeneration);

    });
  } catch(e) { console.warn('pbActivateX3DTimers error:', e); }
}

function pbStopX3DTimers() {
  // Disable timers by deriving names from _x3dTimerActive keys (Avatar_X -> Timer_X_1, Timer_X_2, etc.)
  // Does NOT use scene.namedNodes enumeration — Script nodes not reliably enumerated by X_ITE SAI.
  if (canvas && canvas.browser) {
    try {
      var scene = canvas.browser.currentScene;
      if (scene) {
        Object.keys(_x3dTimerActive).forEach(function(avatarName) {
          var suffix = avatarName.replace(/^Avatar_/, '');
          // Disable up to 8 segments worth of timers and dwells
          for (var i = 1; i <= 8; i++) {
            ['Timer_'+suffix+'_'+i, 'Dwell_'+suffix+'_'+i].forEach(function(nodeName) {
              try {
                var n = scene.getNamedNode(nodeName);
                if (n) n.enabled = false;
              } catch(e) {}
            });
          }
        });
      }
    } catch(e) {}
  }
  _x3dTimerActive = {};
  // Stop all segmentArrived polls
  if (window._pbPollingSegment) {
    Object.keys(window._pbPollingSegment).forEach(function(k) {
      window._pbPollingSegment[k] = false;
    });
  }
}
var _lerpActive = {};      // suffix → { timer, stepNum }
var _lerpDest   = {};      // suffix → { x, z } — intended destination, set once per step change

function pbPushPosition(wp) {
  if (!wp) return;
  var x = parseFloat(wp.pos_x)||0, y = parseFloat(wp.pos_y)||0, z = parseFloat(wp.pos_z)||0;
  if (!wp.cultivar) { console.warn('pbPushPosition: no cultivar in wp', wp); return; }
  // If X3D TimeSensor is driving this avatar, skip JS lerp entirely
  var safeName = wp.cultivar.replace(/[^A-Za-z0-9_]/g,'_');
  var nodeName = 'Avatar_' + safeName;
  if (_x3dTimerActive[nodeName]) return;
  try {
    var scene = canvas.browser.currentScene;
    if (!scene) return;
    var safeName = wp.cultivar.replace(/[^A-Za-z0-9_]/g,'_');
    var nodeName = 'Avatar_' + safeName;
    var avatarNode = scene.getNamedNode(nodeName);
    if (!avatarNode) {
      console.warn('pbPushPosition: node not found:', nodeName, '— cultivar was:', wp.cultivar);
      return;
    }

    // If already lerping toward this exact destination, do not restart — let it finish.
    var dest = _lerpDest[safeName];
    if (dest && Math.abs(dest.x - x) < 0.01 && Math.abs(dest.z - z) < 0.01) return;

    // New destination — cancel any in-progress lerp and start fresh.
    if (_lerpActive[safeName]) {
      clearInterval(_lerpActive[safeName].timer);
      delete _lerpActive[safeName];
    }
    _lerpDest[safeName] = { x: x, z: z };

    // Read start position from stored destination of previous lerp (not from SAI read-back,
    // which may lag). Fall back to SAI read only when no prior destination is known.
    var startX, startZ;
    if (dest) {
      startX = dest.x;
      startZ = dest.z;
    } else {
      var cur = avatarNode.translation;
      startX = cur ? (cur.x || 0) : 0;
      startZ = cur ? (cur.z || 0) : 0;
    }

    var pace = parseFloat((document.getElementById('pb-pace')||{}).value) || 3.0;
    var LERP_FPS = 30;
    var totalSteps = Math.max(1, Math.round(pace * LERP_FPS));
    var stepMs     = Math.round(1000 / LERP_FPS);

    console.log('pbPushPosition:', nodeName, 'from', startX, startZ, '→', x, z);

    var state = { stepNum: 0 };
    state.timer = setInterval(function() {
      state.stepNum++;
      var t = state.stepNum / totalSteps;
      t = t * t * (3 - 2 * t);  // smoothstep
      var lx = startX + (x - startX) * t;
      var lz = startZ + (z - startZ) * t;
      try {
        avatarNode.translation = new X3D.SFVec3f(lx, y, lz);
      } catch(e) {}
      if (state.stepNum >= totalSteps) {
        clearInterval(state.timer);
        delete _lerpActive[safeName];
        try { avatarNode.translation = new X3D.SFVec3f(x, y, z); } catch(e) {}
      }
    }, stepMs);

    _lerpActive[safeName] = state;

  } catch(e) { console.warn('pbPushPosition error:', e); }
}

  const pace = parseFloat(document.getElementById('pb-pace').value) || 3.0;

      // zone may be on the waypoint dict, or derivable from waypoint name via _waypointZoneMap
