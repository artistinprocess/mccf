<!--
  MCCF SOUND PANEL — drop-in replacement section for mccf_x3d_loader.html
  =========================================================================
  Place this block in the LEFT COLUMN, beneath the dialog/chorus display div.

  Requires the following already defined in the loader:
    _x3dBrowser  — reference to the X3D Browser object (window.x3dom or X_ITE browser)
    _sceneDoc    — Browser.currentScene / SAI scene reference
    safeSet(nodeId, field, value) — your existing SAI setter helper

  The panel:
    - Lists all zones discovered from the loaded scene (Garden, Village_Plaza, pool)
    - Per zone: ambient file picker + volume knob + dwell file picker + dwell vol knob
    - Global: master volume, fade-in duration, fade-out duration
    - All knob changes write immediately to SoundFader via SAI
    - File pickers write url to the AudioClip node via SAI
    - Files served from /static/media/ on the Flask server
    - Supports mp3, wav, mid/midi
-->

<style>
/* ── Sound Panel ─────────────────────────────── */
#soundPanel {
  margin-top: 6px;
  border-top: 1px solid #2a3a4a;
  padding-top: 6px;
}
#soundPanel .sp-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #7ab8d4;
  text-transform: uppercase;
  margin-bottom: 4px;
}
#soundPanel .sp-global {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
#soundPanel .sp-global label {
  font-size: 10px;
  color: #8a9aaa;
  white-space: nowrap;
}
#soundPanel .sp-global input[type=range] {
  width: 70px;
  accent-color: #7ab8d4;
}
#soundPanel .sp-global input[type=number] {
  width: 38px;
  background: #111a22;
  border: 1px solid #2a3a4a;
  color: #c8d8e8;
  font-size: 10px;
  padding: 1px 3px;
  border-radius: 3px;
}
.sp-zone {
  background: #0d1820;
  border: 1px solid #1e2e3e;
  border-radius: 4px;
  padding: 5px 7px;
  margin-bottom: 4px;
}
.sp-zone-name {
  font-size: 10px;
  font-weight: 700;
  color: #a0c8e0;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
.sp-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}
.sp-row .sp-tag {
  font-size: 9px;
  color: #607080;
  width: 38px;
  flex-shrink: 0;
}
.sp-file-btn {
  font-size: 9px;
  background: #162430;
  border: 1px solid #2a4060;
  color: #90b8d0;
  padding: 2px 6px;
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sp-file-btn:hover { background: #1e3448; }
.sp-file-btn.loaded { border-color: #3a8060; color: #60c890; }
.sp-vol {
  width: 60px;
  accent-color: #5a9ab0;
}
.sp-vol-dwell {
  accent-color: #9a70b0;
}
.sp-val {
  font-size: 9px;
  color: #607080;
  width: 24px;
  text-align: right;
}
.sp-clear {
  font-size: 9px;
  background: none;
  border: none;
  color: #604040;
  cursor: pointer;
  padding: 0 2px;
}
.sp-clear:hover { color: #c04040; }
/* hidden file inputs */
.sp-file-input { display: none; }
</style>

<div id="soundPanel">
  <div class="sp-title">&#9836; Zone Audio</div>

  <!-- Global controls -->
  <div class="sp-global">
    <label>Master</label>
    <input type="range" id="sp_master" min="0" max="1" step="0.01" value="1.0"
      oninput="spSetFader('masterVolume', parseFloat(this.value)); document.getElementById('sp_master_val').textContent=Math.round(this.value*100)+'%'"/>
    <span class="sp-val" id="sp_master_val">100%</span>

    <label>Fade&nbsp;In</label>
    <input type="number" id="sp_fadein" value="1.5" min="0.1" max="10" step="0.1"
      onchange="spSetFader('fadeInDuration', parseFloat(this.value))"/>s

    <label>Fade&nbsp;Out</label>
    <input type="number" id="sp_fadeout" value="2.5" min="0.1" max="10" step="0.1"
      onchange="spSetFader('fadeOutDuration', parseFloat(this.value))"/>s
  </div>

  <!-- Per-zone rows — generated by spBuildZoneRows() on scene load -->
  <div id="sp_zones"></div>
</div>

<script>
// ── Sound Panel Logic ────────────────────────────────────────────────────────

// Zone definitions: key must match X3D DEF suffix (Sound_<key>, SoundNode_<key>, vol_<key>)
var SP_ZONES = [
  { key: 'Garden',        label: 'Garden' },
  { key: 'Village_Plaza', label: 'Village Plaza' },
  { key: 'pool',          label: 'Pool' }
];

// Called once after scene loads — build zone rows and restore any saved state
function spInit() {
  spBuildZoneRows();
  // push initial scalar values to SoundFader
  spSetFader('masterVolume',    parseFloat(document.getElementById('sp_master').value));
  spSetFader('fadeInDuration',  parseFloat(document.getElementById('sp_fadein').value));
  spSetFader('fadeOutDuration', parseFloat(document.getElementById('sp_fadeout').value));
}

function spBuildZoneRows() {
  var container = document.getElementById('sp_zones');
  container.innerHTML = '';
  SP_ZONES.forEach(function(z) {
    var html = '<div class="sp-zone">' +
      '<div class="sp-zone-name">' + z.label + '</div>' +

      // Ambient track
      '<div class="sp-row">' +
        '<span class="sp-tag">Ambient</span>' +
        '<button class="sp-file-btn" id="sp_btn_'+z.key+'" onclick="spPickFile(\''+z.key+'\',\'ambient\')">Choose file&hellip;</button>' +
        '<button class="sp-clear" onclick="spClearFile(\''+z.key+'\',\'ambient\')" title="Clear">&#x2715;</button>' +
        '<input type="range" class="sp-vol" id="sp_vol_'+z.key+'" min="0" max="1" step="0.01" value="0.8"' +
          ' oninput="spSetVol(\''+z.key+'\',\'ambient\',this.value)"/>' +
        '<span class="sp-val" id="sp_volval_'+z.key+'">80%</span>' +
      '</div>' +

      // Dwell event track
      '<div class="sp-row">' +
        '<span class="sp-tag">Dwell</span>' +
        '<button class="sp-file-btn" id="sp_btn_'+z.key+'_dwell" onclick="spPickFile(\''+z.key+'\',\'dwell\')">Choose file&hellip;</button>' +
        '<button class="sp-clear" onclick="spClearFile(\''+z.key+'\',\'dwell\')" title="Clear">&#x2715;</button>' +
        '<input type="range" class="sp-vol sp-vol-dwell" id="sp_vol_'+z.key+'_dwell" min="0" max="1" step="0.01" value="0.9"' +
          ' oninput="spSetVol(\''+z.key+'\',\'dwell\',this.value)"/>' +
        '<span class="sp-val" id="sp_volval_'+z.key+'_dwell">90%</span>' +
      '</div>' +

    '</div>';
    container.insertAdjacentHTML('beforeend', html);
  });

  // Hidden file input (shared, reused)
  if (!document.getElementById('sp_hidden_file')) {
    var fi = document.createElement('input');
    fi.type = 'file';
    fi.id   = 'sp_hidden_file';
    fi.className = 'sp-file-input';
    fi.accept = '.mp3,.wav,.mid,.midi';
    fi.addEventListener('change', spOnFileChosen);
    document.body.appendChild(fi);
  }
}

// Track which zone+layer the open file picker is for
var _spPickTarget = null;

function spPickFile(zoneKey, layer) {
  _spPickTarget = { key: zoneKey, layer: layer };
  var fi = document.getElementById('sp_hidden_file');
  fi.value = '';
  fi.click();
}

function spOnFileChosen(evt) {
  var file = evt.target.files[0];
  if (!file || !_spPickTarget) return;
  var t = _spPickTarget;
  var isDwell = (t.layer === 'dwell');

  // Build server path: file must be uploaded to static/media/ by the user
  // The loader sends the filename; the server resolves to static/media/<name>
  var serverPath = '../media/' + file.name;

  // Update button label
  var btnId = isDwell ? ('sp_btn_'+t.key+'_dwell') : ('sp_btn_'+t.key);
  var btn = document.getElementById(btnId);
  if (btn) { btn.textContent = file.name; btn.classList.add('loaded'); }

  // Write url to AudioClip via SAI
  var clipId = isDwell ? ('Sound_'+t.key+'_Dwell') : ('Sound_'+t.key);
  spSetClipUrl(clipId, serverPath);

  mccfLog('Sound: '+clipId+' → '+serverPath);
  _spPickTarget = null;
}

function spClearFile(zoneKey, layer) {
  var isDwell = (layer === 'dwell');
  var btnId  = isDwell ? ('sp_btn_'+zoneKey+'_dwell') : ('sp_btn_'+zoneKey);
  var clipId = isDwell ? ('Sound_'+zoneKey+'_Dwell')  : ('Sound_'+zoneKey);
  var btn = document.getElementById(btnId);
  if (btn) { btn.textContent = 'Choose file\u2026'; btn.classList.remove('loaded'); }
  spSetClipUrl(clipId, '');
}

function spSetVol(zoneKey, layer, rawVal) {
  var v = parseFloat(rawVal);
  var isDwell = (layer === 'dwell');
  var valId  = isDwell ? ('sp_volval_'+zoneKey+'_dwell') : ('sp_volval_'+zoneKey);
  var faderField = isDwell ? ('vol_'+zoneKey+'_Dwell') : ('vol_'+zoneKey);
  var el = document.getElementById(valId);
  if (el) el.textContent = Math.round(v*100)+'%';
  spSetFader(faderField, v);
}

// ── SAI writers ──────────────────────────────────────────────────────────────

function spSetFader(field, value) {
  // Write SFFloat to SoundFader node via SAI
  try {
    var scene = _getScene();
    if (!scene) return;
    var node = scene.getNamedNode('SoundFader');
    if (node) node[field] = value;
  } catch(e) {
    // SAI not ready yet — silently ignore; values will be pushed again on spInit()
  }
}

function spSetClipUrl(clipNodeId, urlStr) {
  try {
    var scene = _getScene();
    if (!scene) return;
    var node = scene.getNamedNode(clipNodeId);
    if (node) {
      // X3D MFString url field — wrap in array
      node.url = urlStr ? [urlStr] : [];
      // Restart clip if url was set and loop is true
      if (urlStr) node.startTime = _getBrowserTime();
    }
  } catch(e) {
    console.warn('spSetClipUrl', clipNodeId, e);
  }
}

// Helper: get SAI scene reference (compatible with both x3dom and X_ITE)
function _getScene() {
  // Your loader already has this pattern — adapt to match your actual variable name
  if (typeof _sceneDoc !== 'undefined' && _sceneDoc) return _sceneDoc;
  try {
    var el = document.querySelector('x3d, X3D');
    if (el && el.runtime) return el.runtime.canvas.doc._scene; // x3dom
  } catch(e) {}
  try {
    if (window.Browser) return window.Browser.currentScene; // X_ITE global
  } catch(e) {}
  return null;
}

function _getBrowserTime() {
  try { return window.Browser ? window.Browser.currentTime : performance.now()/1000; } catch(e) { return 0; }
}

// ── Hook into your existing scene-load callback ──────────────────────────────
// Call spInit() wherever your loader fires after the X3D scene is ready.
// Example — add this line to your existing onSceneLoaded / _onX3DReady handler:
//   spInit();
</script>
